customPages:
  main:
      display: "Main"
      sub:
        - id: home
          name: "Home"
          path: /storage/internal/pages/main/home.html
          type: html
        - id: blogs
          name: "Blogs"
          path: /storage/internal/pages/main/blogs.html
          type: html
    content:
      display: "Content"
      sub:
        - id: projects
          name: "Projects"
          path: /storage/internal/pages/main/projects.html
          type: html
        - id: downloads
          name: "Downloads"
          path: /storage/internal/pages/main/downloads.html
          type: html
          
  community:
    display: "Community"
    sub:
      - id: chitchat
        name: "Chits & Chats"
        path: ~/../main/chitchat.html
        type:
          type: html

  interests:
    display: "Interests"
    sub:
      - id: lgames
        name: "Liked Games"
        path: ~/../main/games.html
        type:
          type: html

      - id: lmusic
        name: "Liked Music"
        path: ~/lmusic.html
        type:
          type: html

      - id: lbooks
        name: "Liked Books"
        path: ~/lbooks.yaml
        type:
          type: interests

  extra:
    display: "Extra Content"
    sub:
      - id: writing
        name: "Writing Projects"
        path: ~/writing.yaml
        type:
          type: section

      - id: books
        display: "Books"
        name: "Books"
        path: ~/writing/books.yaml
        type:
          type: refsection
          refid: writing

      - id: poems
        display: "Poems"
        name: "Poems"
        path: ~/writing/poems.yaml
        type:
          type: refsection
          refid: writing
          
      - id: funcgen
        name: "Function Generator"
        path: ~/function_generator.html
        type:
          type: html
        hidden: true
      
      - id: ranking
        name: "Tier List Maker"
        path: ~/ranking.html
        type:
          type: html

      - id: globe
        name: "World Clock Viewer"
        path: ~/worldclock.html
        type:
          type: html

      - id: zato
        name: "Z.A.T.O Live Tier List"
        path: ~/zato.html
        type:
          type: html

  archive:
    display: "Archives"
    sub:
      - id: oricde
        name: "Oricade Songs"
        path: ~/oricade.yaml
        type:
          type: gallery
        hidden: true