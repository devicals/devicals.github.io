<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Custom Crafting Generator</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4997/4997543.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <style>
        :root {
            --background: 246 13% 5%;
            --foreground: 160 50% 80%;
            --card: 246 13% 5%;
            --card-foreground: 160 50% 80%;
            --primary: 160 100% 70%;
            --primary-foreground: 246 13% 5%;
            --secondary: 246 13% 8%;
            --secondary-foreground: 160 50% 80%;
            --muted: 246 13% 8%;
            --muted-foreground: 160 30% 50%;
            --accent: 160 100% 70%;
            --accent-foreground: 0 0% 0%;
            --border: 160 50% 50%;
            --input: 246 13% 8%;
            --ring: 160 100% 70%;
            --radius: 0rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-radius: 0 !important;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: transparent;
            color: hsl(var(--foreground));
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .text-accent {
            color: hsl(var(--accent));
        }

        .subtitle {
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .card {
            background: rgba(5,5,5,0.85);
            border: 1px solid hsl(var(--foreground) / 0.3);
            padding: 24px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: hsl(var(--foreground));
        }

        .input-group {
            margin-bottom: 20px;
            padding: 16px;
            background-color: hsl(var(--secondary) / 0.5);
            border-left: 4px solid hsl(var(--accent));
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: block;
            font-weight: 500;
            color: hsl(var(--foreground));
            margin-bottom: 6px;
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            background-color: hsl(var(--input));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: hsl(var(--accent));
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input::placeholder {
            color: hsl(var(--muted-foreground));
        }

        .result-section {
            margin-top: 24px;
        }

        .divider {
            height: 1px;
            background-color: hsl(var(--border));
            margin: 24px 0;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background-color: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .output-card {
            display: none;
            margin-top: 20px;
        }

        .output-card.show {
            display: block;
        }

        .output-content {
            padding: 20px;
            background-color: hsl(var(--secondary));
            position: relative;
        }

        .output-content pre {
            color: hsl(var(--accent));
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            margin: 0;
            line-height: 1.6;
        }

        .copy-btn {
            margin-top: 12px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed hsl(var(--foreground) / 0.3);
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="text-accent">Custom Crafts</span> Function Gen</h1>
            <p class="subtitle">personal uses, if you found this then idk cuz u dont even know what to do with this</p>
        </header>

        <div class="card">
            <h2>Item Inputs</h2>
            <div id="items-container"></div>

            <div class="divider"></div>

            <div class="result-section">
                <label for="res">Result:</label>
                <input type="text" id="res" placeholder="e.g., weapons/rusty_sword">
            </div>

            <div class="divider"></div>

            <button onclick="generate()">Generate Function</button>
        </div>

        <div class="card output-card" id="output-card">
            <h2>Generated Output</h2>
            <div class="output-content">
                <pre id="output-text"></pre>
            </div>
            <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
        </div>

        <footer>
            <p>© Error Dev. Minecraft Function Generator</p>
        </footer>
    </div>

    <script>
        const container = document.getElementById('items-container');
        for (let i = 1; i <= 9; i++) {
            const group = document.createElement('div');
            group.className = 'input-group';
            group.innerHTML = `
                <div class="input-row">
                    <div>
                        <label for="i${i}">Item ${i}:</label>
                        <input type="text" id="i${i}" placeholder="e.g., minecraft:stick" oninput="validateInput(this); updateDataState(${i})">
                    </div>
                    <div>
                        <label for="d${i}">Item ${i} Custom Data:</label>
                        <input type="text" id="d${i}" placeholder="e.g., custom:data" disabled oninput="validateInput(this)">
                    </div>
                </div>
            `;
            container.appendChild(group);
        }

        function validateInput(input) {
            const regex = /^[a-z_:\/]*$/;
            if (!regex.test(input.value)) {
                input.value = input.value.replace(/[^a-z_:\/]/g, '');
            }
        }

        function updateDataState(itemNum) {
            const itemInput = document.getElementById(`i${itemNum}`);
            const dataInput = document.getElementById(`d${itemNum}`);

            if (itemInput.value.trim() === '') {
                dataInput.disabled = true;
                dataInput.value = '';
            } else {
                dataInput.disabled = false;
            }
        }

        function generate() {
            const items = [];
            const data = [];
            const dataBools = [];
            const isAir = [];

            for (let i = 1; i <= 9; i++) {
                const itemVal = document.getElementById(`i${i}`).value.trim();
                const dataVal = document.getElementById(`d${i}`).value.trim();

                items.push(itemVal);
                data.push(dataVal);
                dataBools.push(dataVal !== '' ? '1' : '0');
                isAir.push(itemVal === '' ? '1' : '0');
            }

            const result = document.getElementById('res').value.trim();

            const output = `function cc:mystic_table/recipe/base_recipe {item_0:${items[0]},item_1:${items[1]},item_2:${items[2]},item_3:${items[3]},item_4:${items[4]},item_5:${items[5]},item_6:${items[6]},item_7:${items[7]},item_8:${items[8]},data_0:"${data[0]}",data_1:"${data[1]}",data_2:"${data[2]}",data_3:"${data[3]}",data_4:"${data[4]}",data_5:"${data[5]}",data_6:"${data[6]}",data_7:"${data[7]}",data_8:"${data[8]}",0:${dataBools[0]},1:${dataBools[1]},2:${dataBools[2]},3:${dataBools[3]},4:${dataBools[4]},5:${dataBools[5]},6:${dataBools[6]},7:${dataBools[7]},8:${dataBools[8]},result:"${result}",is_air_0:${isAir[0]},is_air_1:${isAir[1]},is_air_2:${isAir[2]},is_air_3:${isAir[3]},is_air_4:${isAir[4]},is_air_5:${isAir[5]},is_air_6:${isAir[6]},is_air_7:${isAir[7]},is_air_8:${isAir[8]}}`;

            document.getElementById('output-text').textContent = output;
            document.getElementById('output-card').classList.add('show');
            document.getElementById('output-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyToClipboard() {
            const text = document.getElementById('output-text').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
