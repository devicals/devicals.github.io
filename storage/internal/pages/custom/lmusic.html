<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liked Music - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        * { border-radius: 0 !important; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; scrollbar-width: none !important; }
        .game-section { margin-bottom: 3rem; }
        .section-title { color: hsl(var(--accent)); margin-bottom: 1.2rem; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .tilt-wrapper { display: block; perspective: 1000px; user-select: none; position: relative; }
        .fav-card, .liked-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.2s ease-out, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease; transform-style: preserve-3d; pointer-events: none; will-change: transform; backface-visibility: hidden; outline: 1px solid transparent; transform: translateZ(1px); }
        .tilt-wrapper:hover .fav-card, .tilt-wrapper:hover .liked-card, .tilt-wrapper.is-tapped .fav-card, .tilt-wrapper.is-tapped .liked-card { border-color: rgba(255, 255, 255, 0.4); background: rgba(255, 255, 255, 0.06); box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 100; }
        body.is-admin .tilt-wrapper { cursor: grab; }
        .fav-card { padding: 35px; display: flex; justify-content: space-between; align-items: center; gap: 20px; overflow: hidden; }
        .fav-title { font-size: 1.4rem; font-weight: 700; color: #fff; transition: transform 0.4s ease; transform-style: preserve-3d; backface-visibility: hidden; }
        .fav-comment { font-size: 0.85rem; opacity: 0.6; display: block; white-space: pre-wrap; line-height: 1.4; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .games-grid .tilt-wrapper { height: 60px; }
        .liked-card { height: 100%; padding: 10px; text-align: center; color: #ccc; display: flex; align-items: center; justify-content: center; word-break: break-word; font-size: 0.85rem; }
        .admin-action-btn { display: none; position: absolute; background: none; border: none; cursor: pointer; z-index: 10; pointer-events: auto !important; color: hsl(var(--foreground)); }
        body.is-admin .admin-action-btn { display: block; }
        .add-grid-item-container { display: none; width: 100%; border: 2px dashed hsl(var(--border)); padding: 10px; margin-bottom: 15px; gap: 10px; }
        body.is-admin .add-grid-item-container { display: flex; }
        .add-grid-item-container input { flex: 1; padding: 8px 12px; background: hsl(var(--secondary)); border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); font-family: inherit; outline: none; }
        .btn-primary { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); border: 1px solid hsl(var(--accent)); padding: 8px 16px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">Liked Music</h1>
        <div class="game-section">
            <h2 class="section-title">Favorites</h2>
            <div id="favorite-list"></div>
        </div>
        <div class="game-section">
            <h2 class="section-title">Music I Drank</h2>
            <div class="add-grid-item-container">
                <input type="text" id="add-music-input" placeholder="Add song (Title @ Artist)...">
                <button class="btn-primary" onclick="addMusicItem()">+ Add</button>
            </div>
            <div id="liked-music-grid" class="games-grid"></div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let musicData = { favorites: [], sections: [{ display: "Music I Drank", items: [] }] };
        let isAdmin = false;

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            isAdmin = (session?.user?.email?.toLowerCase() === '3rr0r.d3v@gmail.com');
            document.body.classList.toggle('is-admin', isAdmin);
        }

        async function initDatabase() {
            const { data } = await supabaseClient.from('site_content').select('data').eq('key', 'lmusic').single();
            if (data) musicData = data.data;
            renderPage();
            supabaseClient.channel('music-db').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.lmusic' }, (payload) => {
                musicData = payload.new.data; renderPage();
            }).subscribe();
        }

        async function sync() {
            await supabaseClient.from('site_content').update({ data: musicData }).eq('key', 'lmusic');
        }

        function renderPage() {
            const grid = document.getElementById('liked-music-grid');
            grid.innerHTML = '';
            const musicSec = musicData.sections.find(s => s.display === "Music I Drank");
            musicSec.items.forEach((item, idx) => {
                const inner = `
                    <button class="admin-action-btn" style="top:5px; right:5px;" onclick="deleteMusic(${idx})">✕</button>
                    ${item}
                `;
                grid.appendChild(createTiltWrapper('liked-card', inner));
            });
        }

        window.addMusicItem = async () => {
            const input = document.getElementById('add-music-input');
            if (!input.value.trim()) return;
            musicData.sections.find(s => s.display === "Music I Drank").items.push(input.value.trim());
            input.value = '';
            await sync();
        };

        window.deleteMusic = async (idx) => {
            musicData.sections.find(s => s.display === "Music I Drank").items.splice(idx, 1);
            await sync();
        };

        function createTiltWrapper(contentClass, innerHTML) {
            const wrap = document.createElement('div');
            wrap.className = 'tilt-wrapper';
            wrap.innerHTML = `<div class="${contentClass}">${innerHTML}</div>`;
            return wrap;
        }

        document.addEventListener('DOMContentLoaded', () => { initAuth(); initDatabase(); });
    </script>
</body>
</html>
