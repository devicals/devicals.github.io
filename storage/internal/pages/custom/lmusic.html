<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liked Music - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar {
            display: none !important;
        }
        * { 
            border-radius: 0 !important; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        .game-section { margin-bottom: 3rem; position: relative; }
        .section-title { 
            color: hsl(var(--accent)); 
            margin-bottom: 1.2rem; 
            font-size: 1rem; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .tilt-wrapper {
            display: block;
            perspective: 1000px;
            user-select: none;
            position: relative;
        }
        .favorite-list .tilt-wrapper {
            perspective: 2000px; 
            margin-bottom: 12px;
        }
        .fav-card, .liked-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease-out, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            transform-style: preserve-3d;
            pointer-events: none;
            will-change: transform;
            backface-visibility: hidden;
            outline: 1px solid transparent; 
            transform: translateZ(1px); 
        }
        .tilt-wrapper:hover .fav-card, 
        .tilt-wrapper:hover .liked-card,
        .tilt-wrapper.is-tapped .fav-card,
        .tilt-wrapper.is-tapped .liked-card {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 100;
        }
        body.is-admin .tilt-wrapper {
            cursor: grab;
        }
        .fav-tags { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            justify-content: flex-end; 
            max-width: 50%; 
            transform-style: preserve-3d;
        }
        .tag-box { 
            font-size: 0.7rem; 
            padding: 4px 10px; 
            border: 1px solid; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            background: rgba(10, 10, 10, 0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            will-change: transform;
            backface-visibility: hidden;
            outline: 1px solid transparent;
        }
        .tilt-wrapper:hover .tag-box,
        .tilt-wrapper.is-tapped .tag-box {
            transform: 
                translateZ(var(--rand-z, 40px)) 
                translateY(var(--rand-y, -2px)) 
                rotateZ(var(--rand-r, 0deg));
            filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.5));
        }
        .tag-accent { border-color: hsl(var(--accent)); color: hsl(var(--accent)); }
        .tag-golden { border-color: #ffcc00; color: #ffcc00; }
        .tag-gray { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.6); }
        .fav-card {
            padding: 35px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            overflow: hidden;
        }
        .fav-info-group { transform-style: preserve-3d; }
        .fav-title { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: #fff; 
            margin-bottom: 6px; 
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .tilt-wrapper:hover .fav-title,
        .tilt-wrapper.is-tapped .fav-title { 
            transform: translateZ(20px); 
        }
        .fav-comment { font-size: 0.85rem; opacity: 0.6; display: block; white-space: pre-wrap; line-height: 1.4; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .games-grid .tilt-wrapper { height: 85px; }
        .liked-card {
            height: 100%;
            padding: 8px;
            text-align: center;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            line-height: 1.2;
        }
        @media (max-width: 1000px) { .games-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 750px) { 
            .games-grid { grid-template-columns: repeat(3, 1fr); } 
            .fav-card { flex-direction: column; align-items: flex-start; padding: 25px; }
            .fav-tags { justify-content: flex-start; max-width: 100%; margin-top: 25px; }
        }
        .admin-action-btn {
            display: none;
            position: absolute;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            pointer-events: auto !important;
            color: hsl(var(--foreground));
        }
        .admin-action-btn:hover {
            color: hsl(var(--accent));
        }
        .admin-action-btn.del-btn {
            color: hsl(var(--muted-foreground));
        }
        .admin-action-btn.del-btn:hover {
            color: hsl(var(--destructive));
        }
        body.is-admin .admin-action-btn {
            display: block;
        }
        .admin-section-btn {
            display: none;
            background: none;
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            margin-bottom: 12px;
        }
        .admin-section-btn:hover {
            border-color: hsl(var(--accent));
            color: hsl(var(--accent));
        }
        body.is-admin .admin-section-btn {
            display: inline-block;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: hsl(var(--card));
            border: 2px solid hsl(var(--border));
            padding: 24px;
            width: 90%;
            max-width: 440px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid hsl(var(--border));
        }
        .modal-header h2 {
            font-size: 16px;
            margin: 0;
            color: hsl(var(--accent));
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: hsl(var(--foreground));
        }
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal input[type=text], .modal textarea, .modal select {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus {
            border-color: hsl(var(--accent));
        }
        .modal select {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal select:focus {
            border-color: hsl(var(--accent));
        }
        .modal select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: hsl(var(--accent)) !important;
            color: hsl(var(--accent-foreground)) !important;
            border: 1px solid hsl(var(--accent)) !important;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .tag-row-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">Liked Music</h1>
        
        <div class="game-section">
            <h2 class="section-title">Favorites</h2>
            <button class="admin-section-btn" onclick="openAddFavModal()">+ Add Favorite Song</button>
            <div id="favorite-list" class="favorite-list"></div>
        </div>

        <div class="game-section">
            <h2 class="section-title">Music I Drank</h2>
            <button class="admin-section-btn" onclick="connectSpotify()" id="spotify-connect-btn">Connect Spotify Account</button>
            <div id="liked-music-grid" class="games-grid"></div>
        </div>
    </div>

    <div id="fav-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title-label">Manage Favorite</h2>
                <button class="modal-close" onclick="closeFavModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="fav-title-input" placeholder="Title">
                <textarea id="fav-comment-input" placeholder="Comment"></textarea>
                
                <div style="border-top:1px dashed hsl(var(--border)); padding-top:12px; display:flex; flex-direction:column; gap:8px;">
                    <label style="font-size:11px; text-transform:uppercase; color:hsl(var(--muted-foreground));">Custom Tags</label>
                    
                    <div class="tag-row-input">
                        <input type="text" id="tag-0-text" placeholder="Tag 1 (e.g. Peak)">
                        <select id="tag-0-style" style="width:120px;">
                            <option value="accent">Accent</option>
                            <option value="golden">Golden</option>
                            <option value="gray">Gray</option>
                        </select>
                    </div>

                    <div class="tag-row-input">
                        <input type="text" id="tag-1-text" placeholder="Tag 2 (e.g. Yummy)">
                        <select id="tag-1-style" style="width:120px;">
                            <option value="accent">Accent</option>
                            <option value="golden">Golden</option>
                            <option value="gray">Gray</option>
                        </select>
                    </div>
                </div>

                <button class="btn-primary" onclick="saveFavorite()" style="width: 100%; padding: 10px; margin-top:5px;">Save Favorite</button>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let musicData = null;
        let isAdmin = false;
        let activeEditIdx = null;
        let dragItemIdx = null;
        let dragCategory = null;

        function generateRandomString(length) {
            let text = '';
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < length; i++) {
                text += possible.charAt(Math.floor(Math.random() * possible.length));
            }
            return text;
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        async function connectSpotify() {
            const clientId = prompt("Enter your Spotify Client ID:");
            if (!clientId) return;
            localStorage.setItem('spotify_client_id', clientId);
            
            const codeVerifier = generateRandomString(64);
            localStorage.setItem('spotify_code_verifier', codeVerifier);
            
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            
            const params = new URLSearchParams({
                response_type: 'code',
                client_id: clientId,
                scope: 'user-library-read',
                redirect_uri: window.location.origin + window.location.pathname,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge
            });
            
            window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
        }

        async function handleSpotifyCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (!code) return;
            
            const codeVerifier = localStorage.getItem('spotify_code_verifier');
            const clientId = localStorage.getItem('spotify_client_id');
            if (!codeVerifier || !clientId) return;

            const payload = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    client_id: clientId,
                    grant_type: 'authorization_code',
                    code,
                    redirect_uri: window.location.origin + window.location.pathname,
                    code_verifier: codeVerifier,
                }),
            };
            
            try {
                const body = await fetch('https://accounts.spotify.com/api/token', payload);
                const response = await body.json();
                if (response.refresh_token) {
                    localStorage.setItem('spotify_refresh_token', response.refresh_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    alert("Successfully connected to Spotify!");
                    location.reload();
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function getSpotifyAccessToken() {
            const refreshToken = localStorage.getItem('spotify_refresh_token');
            const clientId = localStorage.getItem('spotify_client_id');
            if (!refreshToken || !clientId) return null;
            
            const payload = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    grant_type: 'refresh_token',
                    refresh_token: refreshToken,
                    client_id: clientId
                }),
            };
            try {
                const body = await fetch('https://accounts.spotify.com/api/token', payload);
                const response = await body.json();
                return response.access_token;
            } catch (e) {
                return null;
            }
        }

        async function fetchSpotifyLikedSongs(accessToken) {
            try {
                const response = await fetch('https://api.spotify.com/v1/me/tracks?limit=50', {
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    }
                });
                const data = await response.json();
                if (data && data.items) {
                    return data.items.map(item => `${item.track.name} @ ${item.track.artists.map(a => a.name).join(', ')}`);
                }
            } catch (e) {
                console.error(e);
            }
            return [];
        }

        async function syncSpotify() {
            if (!isAdmin) return;
            const token = await getSpotifyAccessToken();
            if (!token) return;
            
            const songs = await fetchSpotifyLikedSongs(token);
            if (songs.length > 0) {
                if (!musicData.sections) musicData.sections = [];
                let musicSec = musicData.sections.find(s => s.display === "Music I Drank");
                if (!musicSec) {
                    musicSec = { display: "Music I Drank", items: [] };
                    musicData.sections.push(musicSec);
                }
                if (JSON.stringify(musicSec.items) !== JSON.stringify(songs)) {
                    musicSec.items = songs;
                    await syncToSupabase();
                }
            }
        }

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        function handleUserSession(session) {
            const connectBtn = document.getElementById('spotify-connect-btn');
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
                if (connectBtn) {
                    const token = localStorage.getItem('spotify_refresh_token');
                    connectBtn.textContent = token ? "Reconnect Spotify" : "Connect Spotify";
                }
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            if (musicData) renderPage();
        }

        async function initDatabase() {
            const { data, error } = await supabaseClient
                .from('site_content')
                .select('data')
                .eq('key', 'lmusic')
                .single();

            if (data && data.data) {
                musicData = data.data;
                renderPage();
                if (isAdmin) await syncSpotify();
            }

            supabaseClient
                .channel('music-realtime')
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.lmusic' },
                    (payload) => {
                        if (payload.new && payload.new.data) {
                            musicData = payload.new.data;
                            renderPage();
                        }
                    }
                )
                .subscribe();
        }

        async function syncToSupabase() {
            if (!isAdmin) return;
            const { error } = await supabaseClient
                .from('site_content')
                .update({ data: musicData })
                .eq('key', 'lmusic');
            if (error) {
                alert("Error saving: " + error.message);
            }
        }

        function renderPage() {
            renderFavorites(musicData.favorites);
            const musicSec = musicData.sections?.find(s => s.display === "Music I Drank");
            renderGrid(musicSec ? musicSec.items : [], 'liked-music-grid');
        }

        function renderFavorites(favs) {
            const container = document.getElementById('favorite-list');
            container.innerHTML = '';
            if (!favs) return;
            favs.forEach((fav, idx) => {
                let tagsHTML = '';
                const tagList = fav.tags || [];
                tagList.forEach(t => { tagsHTML += `<span class="tag-box tag-${t.style || 'accent'}">${t.tag}</span>`; });
                
                const inner = `
                    <button class="admin-action-btn" id="edit-fav-btn-${idx}" style="top:4px; left:4px;">✎</button>
                    <button class="admin-action-btn del-btn" id="del-fav-btn-${idx}" style="top:4px; right:4px;">✕</button>
                    <div class="fav-info-group">
                        <div class="fav-title">${fav.title}</div>
                        <span class="fav-comment">${fav.comment || ''}</span>
                    </div>
                    <div class="fav-tags">${tagsHTML}</div>
                `;
                
                const wrap = createTiltWrapper('fav-card', inner);
                wrap.dataset.index = idx;

                if (isAdmin) {
                    wrap.draggable = true;
                    wrap.addEventListener('dragstart', (e) => {
                        dragItemIdx = idx;
                        dragCategory = 'favorites';
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    wrap.addEventListener('dragover', (e) => {
                        if (dragCategory !== 'favorites') return;
                        e.preventDefault();
                    });
                    wrap.addEventListener('drop', async (e) => {
                        if (dragCategory !== 'favorites') return;
                        e.preventDefault();
                        const targetIdx = idx;
                        if (dragItemIdx === targetIdx) return;
                        const [reorderedItem] = musicData.favorites.splice(dragItemIdx, 1);
                        musicData.favorites.splice(targetIdx, 0, reorderedItem);
                        await syncToSupabase();
                    });
                }

                container.appendChild(wrap);

                const delBtn = document.getElementById(`del-fav-btn-${idx}`);
                if (delBtn) {
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteFavorite(idx); };
                }

                const editBtn = document.getElementById(`edit-fav-btn-${idx}`);
                if (editBtn) {
                    editBtn.onclick = (e) => { e.stopPropagation(); openEditFavModal(fav, idx); };
                }
            });
        }

        function renderGrid(list, containerId) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            if (!list) return;
            list.forEach((title) => {
                grid.appendChild(createTiltWrapper('liked-card', title));
            });
            document.querySelectorAll('.liked-card').forEach(fitText);
        }

        function randomizeTags(wrapper) {
            const tags = wrapper.querySelectorAll('.tag-box');
            tags.forEach(tag => {
                const z = Math.floor(Math.random() * 50) + 30;
                const y = Math.floor(Math.random() * 12) * -1;
                const r = Math.floor(Math.random() * 24) - 12;
                tag.style.setProperty('--rand-z', `${z}px`);
                tag.style.setProperty('--rand-y', `${y}px`);
                tag.style.setProperty('--rand-r', `${r}deg`);
            });
        }

        function handleTilt(e) {
            const wrapper = e.currentTarget;
            const card = wrapper.querySelector('.fav-card, .liked-card');
            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left, y = clientY - rect.top;
            const centerX = rect.width / 2, centerY = rect.height / 2;
            let rotX, rotY, scale;
            if (card.classList.contains('fav-card')) {
                rotX = Math.max(Math.min((centerY - y) / 15, 7), -7);
                rotY = Math.max(Math.min((x - centerX) / 80, 7), -7);
                scale = 1.03;
            } else {
                rotX = (centerY - y) / 6; rotY = (x - centerX) / 10; scale = 1.1;
            }
            card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(${scale}, ${scale}, ${scale})`;
        }

        function resetAllTilts() {
            document.querySelectorAll('.fav-card, .liked-card').forEach(card => {
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                card.parentElement.classList.remove('is-tapped');
            });
        }

        function createTiltWrapper(contentClass, innerHTML) {
            const wrap = document.createElement('div');
            wrap.className = 'tilt-wrapper';
            wrap.innerHTML = `<div class="${contentClass}">${innerHTML}</div>`;
            const start = () => { if (contentClass === 'fav-card') randomizeTags(wrap); wrap.classList.add('is-tapped'); };
            wrap.addEventListener('mouseenter', start);
            wrap.addEventListener('touchstart', (e) => { document.querySelectorAll('.is-tapped').forEach(w => w.classList.remove('is-tapped')); start(); handleTilt(e); }, {passive: true});
            wrap.addEventListener('mousemove', handleTilt);
            wrap.addEventListener('touchmove', handleTilt, {passive: true});
            wrap.addEventListener('mouseleave', () => { wrap.querySelector('div').style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1,1,1)`; wrap.classList.remove('is-tapped'); });
            return wrap;
        }

        function fitText(el) {
            let fs = 0.85; el.style.fontSize = fs + 'rem';
            while (el.scrollHeight > el.offsetHeight && fs > 0.5) { fs -= 0.02; el.style.fontSize = fs + 'rem'; }
        }

        window.openAddFavModal = () => {
            activeEditIdx = null;
            document.getElementById('fav-title-input').value = '';
            document.getElementById('fav-comment-input').value = '';
            document.getElementById('tag-0-text').value = '';
            document.getElementById('tag-0-style').value = 'accent';
            document.getElementById('tag-1-text').value = '';
            document.getElementById('tag-1-style').value = 'accent';
            document.getElementById('fav-modal').classList.add('active');
        };

        function openEditFavModal(fav, idx) {
            activeEditIdx = idx;
            document.getElementById('fav-title-input').value = fav.title;
            document.getElementById('fav-comment-input').value = fav.comment || '';
            const tag0 = fav.tags?.[0] || { tag: '', style: 'accent' };
            const tag1 = fav.tags?.[1] || { tag: '', style: 'accent' };
            document.getElementById('tag-0-text').value = tag0.tag;
            document.getElementById('tag-0-style').value = tag0.style;
            document.getElementById('tag-1-text').value = tag1.tag;
            document.getElementById('tag-1-style').value = tag1.style;
            document.getElementById('fav-modal').classList.add('active');
        }

        window.closeFavModal = () => {
            document.getElementById('fav-modal').classList.remove('active');
        };

        window.saveFavorite = async () => {
            const title = document.getElementById('fav-title-input').value.trim();
            const comment = document.getElementById('fav-comment-input').value.trim();
            if (!title) return;

            const tags = [];
            const tag0Text = document.getElementById('tag-0-text').value.trim();
            const tag1Text = document.getElementById('tag-1-text').value.trim();
            if (tag0Text) tags.push({ tag: tag0Text, style: document.getElementById('tag-0-style').value });
            if (tag1Text) tags.push({ tag: tag1Text, style: document.getElementById('tag-1-style').value });

            const favObj = { title, comment, tags };
            if (activeEditIdx !== null) {
                musicData.favorites[activeEditIdx] = favObj;
            } else {
                if (!musicData.favorites) musicData.favorites = [];
                musicData.favorites.push(favObj);
            }
            closeFavModal();
            await syncToSupabase();
        };

        async function deleteFavorite(idx) {
            if (!confirm(`Are you sure you want to delete this favorite?`)) return;
            musicData.favorites = musicData.favorites.filter((_, i) => i !== idx);
            await syncToSupabase();
        }

        document.addEventListener('touchstart', (e) => {
            if (!e.target.closest('.tilt-wrapper')) document.querySelectorAll('.is-tapped').forEach(w => w.classList.remove('is-tapped'));
        }, {passive: true});

        document.addEventListener('DOMContentLoaded', async () => {
            await handleSpotifyCallback();
            initDatabase();
            initAuth();
        });
    </script>
</body>
</html>
