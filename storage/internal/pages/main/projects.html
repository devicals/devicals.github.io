<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        * { border-radius: 0 !important; scrollbar-width: none !important; -ms-overflow-style: none !important; }
        body { 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            height: 100vh; 
            overflow: hidden;
            background: transparent;
        }
        
        .vscode-tab-bar {
            display: flex;
            background: hsl(var(--card));
            border-bottom: 1px solid hsl(var(--border));
            overflow-x: auto;
            min-height: 35px;
        }
        .project-tab {
            padding: 8px 15px;
            background: transparent;
            border: none;
            border-right: 1px solid hsl(var(--border));
            color: hsl(var(--muted-foreground));
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .project-tab.active {
            background: hsl(var(--secondary));
            color: hsl(var(--foreground));
            border-top: 2px solid hsl(var(--accent));
        }
        
        .admin-action-row {
            display: none;
            gap: 8px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed hsl(var(--border));
        }
        body.is-admin .admin-action-row {
            display: flex;
        }
        .admin-btn {
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            cursor: pointer;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            flex: 1;
        }
        .admin-btn:hover {
            border-color: hsl(var(--accent));
            color: hsl(var(--accent));
        }
        .admin-btn.danger-btn {
            color: hsl(var(--destructive));
            border-color: hsl(var(--destructive) / 0.4);
        }
        .admin-btn.danger-btn:hover {
            border-color: hsl(var(--destructive));
            background: hsl(var(--destructive) / 0.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            padding: 20px;
            width: 90%;
            max-width: 440px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed hsl(var(--border));
        }
        .modal-header h2 { font-size: 14px; margin: 0; color: hsl(var(--accent)); }
        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: hsl(var(--foreground));
        }
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal input[type=text], .modal textarea {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
        }
        .modal textarea { min-height: 100px; resize: vertical; }
        .modal input:focus, .modal textarea:focus { border-color: hsl(var(--accent)); }
        
        .btn-primary {
            background: hsl(var(--accent)) !important;
            color: hsl(var(--accent-foreground)) !important;
            border: 1px solid hsl(var(--accent)) !important;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }
        
        #add-project-container {
            display: none;
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        body.is-admin #add-project-container { display: block; }
    </style>
</head>
<body>
    
    <div class="ascii-window" id="big-project-window" style="width: 100%; height: 100%; display: flex; flex-direction: column; position: relative;">
        
        <div class="ascii-header-row">
            <div class="ascii-header-line" style="width: 15px;"></div>
            <div class="ascii-title">Projects</div>
            <div class="ascii-header-line" style="flex: 1;"></div>
            <div class="ascii-minimize-btn" onclick="minimizeMe()" style="cursor:pointer; padding: 0 10px; color: hsl(var(--accent)); font-weight: bold;">_</div>
        </div>
        
        <div class="vscode-tab-bar" id="project-tabs"></div>

        <div id="tab-container" style="position: relative; flex: 1; overflow: auto;"></div>

    </div>

    <div id="add-project-container">
        <button class="admin-btn" style="padding:10px 20px; font-size:13px; border-style:dashed; background: hsl(var(--card)); box-shadow: 0 4px 6px rgba(0,0,0,0.5);" onclick="openAddProjectModal()">+ Add Project</button>
    </div>

    <div id="project-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title-label">Create Project Card</h2>
                <button class="modal-close" onclick="closeProjectModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="proj-name-input" placeholder="Project Name">
                <textarea id="proj-desc-input" placeholder="Description"></textarea>
                <input type="text" id="proj-link-input" placeholder="Project URL">
                <button class="btn-primary" onclick="handleSaveProject()" style="width: 100%; padding: 10px;">Save Project</button>
            </div>
        </div>
    </div>

    <div id="tab-edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Tab</h2>
                <button class="modal-close" onclick="closeTabEditModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="tab-name-input" placeholder="Tab Name">
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-primary" onclick="saveTabEdit()" style="flex: 1;">Save</button>
                    <button class="btn-primary" onclick="deleteActiveTab()" style="background: hsl(var(--destructive)) !important; border-color: hsl(var(--destructive)) !important;">Delete Tab</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let projectsData = null;
        let currentTab = null;
        let isAdmin = false;
        let activeEditIdx = null;
        let editingTabKey = null;
        let highestZ = 10;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Control') {
                window.parent.postMessage({ type: 'ctrl-pressed' }, '*');
            }
        });
        document.addEventListener('mousedown', () => {
            window.parent.postMessage({ type: 'iframe-click' }, '*');
        });

        window.minimizeMe = function() {
            window.parent.postMessage({ type: 'minimize-iframe', id: 'content-frame', title: 'Projects' }, '*');
        };

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        function handleUserSession(session) {
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            if (projectsData) renderAll();
        }

        async function initDatabase() {
            const { data } = await supabaseClient.from('site_content').select('data').eq('key', 'projects').single();
            if (data && data.data) {
                projectsData = data.data;
                renderAll();
            }
            supabaseClient.channel('projects-realtime').on('postgres_changes',
                { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.projects' },
                (payload) => {
                    if (payload.new && payload.new.data) {
                        projectsData = payload.new.data;
                        renderAll();
                    }
                }
            ).subscribe();
        }

        async function syncToSupabase() {
            if (!isAdmin) return;
            await supabaseClient.from('site_content').update({ data: projectsData }).eq('key', 'projects');
        }

        function renderAll() {
            const tabs = projectsData.tabs || {};
            const tabsContainer = document.getElementById('project-tabs');
            tabsContainer.innerHTML = '';
            
            Object.keys(tabs).forEach(tabKey => {
                const tabData = tabs[tabKey];
                const tabBtn = document.createElement('button');
                tabBtn.className = `project-tab ${currentTab === tabKey ? 'active' : ''}`;
                tabBtn.dataset.tab = tabKey;
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = tabData.display;
                titleSpan.onclick = () => switchTab(tabKey);
                tabBtn.appendChild(titleSpan);

                if (isAdmin) {
                    const editBtn = document.createElement('span');
                    editBtn.innerHTML = '✎';
                    editBtn.style.marginLeft = '8px';
                    editBtn.style.padding = '2px 4px';
                    editBtn.style.cursor = 'pointer';
                    editBtn.onclick = (e) => { e.stopPropagation(); openTabEditModal(tabKey); };
                    tabBtn.appendChild(editBtn);
                }
                tabsContainer.appendChild(tabBtn);
            });

            if (isAdmin) {
                const addBtn = document.createElement('button');
                addBtn.className = 'project-tab';
                addBtn.innerHTML = '<span>+ Tab</span>';
                addBtn.onclick = createNewTab;
                tabsContainer.appendChild(addBtn);
            }

            const hash = window.location.hash.substring(1);
            if (hash && !currentTab) {
                const params = new URLSearchParams(hash);
                const tab = params.get('tab');
                if (tab && tabs[tab]) currentTab = tab;
                else currentTab = Object.keys(tabs)[0];
            } else if (!currentTab) {
                currentTab = Object.keys(tabs)[0];
            }
            
            if (currentTab) switchTab(currentTab, true);
        }

        function switchTab(tabKey, skipRender = false) {
            currentTab = tabKey;
            document.querySelectorAll('.project-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabKey);
            });
            window.parent.location.hash = `page=projects&tab=${tabKey}`;
            
            renderCardsForActiveTab();
        }

        function renderCardsForActiveTab() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            if (!currentTab || !projectsData.tabs[currentTab]) return;

            const projects = projectsData.tabs[currentTab].projects || [];
            
            projects.forEach((project, idx) => {
                const card = document.createElement('div');
                card.className = 'ascii-window project-card-window';
                card.dataset.index = idx;
                card.style.width = '320px';
                card.style.position = 'absolute'; 

                card.innerHTML = `
                    <div class="ascii-header-row card-drag-handle" style="cursor: move; background: rgba(0,0,0,0.1);">
                        <div class="ascii-header-line" style="width: 10px;"></div>
                        <div class="ascii-title" style="font-size: 11px;">${project.name}</div>
                        <div class="ascii-header-line" style="flex:1;"></div>
                    </div>
                    <div class="ascii-content" style="padding: 15px; display: flex; flex-direction: column; gap: 12px; height: calc(100% - 30px); box-sizing: border-box;">
                        <a href="${project.link}" target="_blank" style="color: hsl(var(--accent)); font-weight: bold; font-size: 12px; text-decoration: none;">[ View Project ]</a>
                        <div style="font-size: 12px; color: hsl(var(--foreground)); line-height: 1.5; flex: 1;">${project.description}</div>
                        <div class="admin-action-row">
                            <button class="admin-btn" onclick="openEditProjectModal(${idx})">Edit</button>
                            <button class="admin-btn danger-btn" onclick="deleteProject(${idx})">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            layoutCards();
        }

        function layoutCards() {
            const container = document.getElementById('tab-container');
            const cards = container.querySelectorAll('.project-card-window');
            const containerWidth = container.clientWidth || window.innerWidth;
            
            const cardWidth = 320;
            const cardHeight = 220; 
            const gap = 20;
            const padding = 20;
            
            let cols = Math.floor((containerWidth - padding * 2 + gap) / (cardWidth + gap));
            if (cols < 1) cols = 1;

            let maxTop = 0;

            cards.forEach((card, idx) => {
                const savedPos = localStorage.getItem(`proj_pos_${currentTab}_${idx}`);
                if (savedPos) {
                    const pos = JSON.parse(savedPos);
                    card.style.left = pos.left;
                    card.style.top = pos.top;
                } else {
                    const col = idx % cols;
                    const row = Math.floor(idx / cols);
                    card.style.left = (padding + col * (cardWidth + gap)) + 'px';
                    card.style.top = (padding + row * (cardHeight + gap)) + 'px';
                }
                
                const topVal = parseInt(card.style.top) || 0;
                if (topVal > maxTop) maxTop = topVal;
                
                makeCardDraggable(card, card.querySelector('.card-drag-handle'));
            });
            
            let dummy = document.getElementById('scroll-dummy');
            if (!dummy) {
                dummy = document.createElement('div');
                dummy.id = 'scroll-dummy';
                dummy.style.position = 'absolute';
                dummy.style.width = '1px';
                container.appendChild(dummy);
            }
            dummy.style.top = (maxTop + cardHeight + padding) + 'px';
        }

        function makeCardDraggable(win, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                e.preventDefault();
                win.style.zIndex = ++highestZ;
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                win.style.top = (win.offsetTop - pos2) + "px";
                win.style.left = (win.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                const idx = win.dataset.index;
                localStorage.setItem(`proj_pos_${currentTab}_${idx}`, JSON.stringify({
                    left: win.style.left,
                    top: win.style.top
                }));
                
                const topVal = parseInt(win.style.top) || 0;
                const dummy = document.getElementById('scroll-dummy');
                const dummyTop = parseInt(dummy.style.top) || 0;
                if (topVal + 250 > dummyTop) {
                    dummy.style.top = (topVal + 250) + 'px';
                }
            }
        }

        window.addEventListener('resize', () => {
            const container = document.getElementById('tab-container');
            const cards = container.querySelectorAll('.project-card-window');
            let hasUnsaved = false;
            cards.forEach(card => {
                if (!localStorage.getItem(`proj_pos_${currentTab}_${card.dataset.index}`)) {
                    hasUnsaved = true;
                }
            });
            if (hasUnsaved) layoutCards();
        });

        window.createNewTab = async () => {
            const name = prompt("Enter new tab name:");
            if (!name) return;
            const key = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
            if (projectsData.tabs && projectsData.tabs[key]) {
                alert("A tab with that name already exists!");
                return;
            }
            if (!projectsData.tabs) projectsData.tabs = {};
            
            const newTabs = {};
            const keys = Object.keys(projectsData.tabs);
            
            if (keys.length === 0 || !currentTab) {
                newTabs[key] = { display: name, projects: [] };
            } else {
                for (const k of keys) {
                    newTabs[k] = projectsData.tabs[k];
                    if (k === currentTab) {
                        newTabs[key] = { display: name, projects: [] };
                    }
                }
            }
            
            projectsData.tabs = newTabs;
            currentTab = key;
            await syncToSupabase();
        };

        window.openTabEditModal = (tabKey) => {
            editingTabKey = tabKey;
            document.getElementById('tab-name-input').value = projectsData.tabs[tabKey].display;
            document.getElementById('tab-edit-modal').classList.add('active');
        };

        window.closeTabEditModal = () => {
            document.getElementById('tab-edit-modal').classList.remove('active');
        };

        window.saveTabEdit = async () => {
            const newName = document.getElementById('tab-name-input').value.trim();
            if (newName) {
                projectsData.tabs[editingTabKey].display = newName;
                await syncToSupabase();
                closeTabEditModal();
            }
        };

        window.deleteActiveTab = async () => {
            if (!confirm(`Delete tab "${projectsData.tabs[editingTabKey].display}"?`)) return;
            delete projectsData.tabs[editingTabKey];
            if (currentTab === editingTabKey) {
                currentTab = Object.keys(projectsData.tabs)[0] || null;
            }
            await syncToSupabase();
            closeTabEditModal();
        };

        window.openAddProjectModal = () => {
            activeEditIdx = null;
            document.getElementById('modal-title-label').textContent = `Create Project [${projectsData.tabs[currentTab].display}]`;
            document.getElementById('proj-name-input').value = "";
            document.getElementById('proj-desc-input').value = "";
            document.getElementById('proj-link-input').value = "";
            document.getElementById('project-modal').classList.add('active');
        };

        window.openEditProjectModal = (idx) => {
            const proj = projectsData.tabs[currentTab].projects[idx];
            activeEditIdx = idx;
            document.getElementById('modal-title-label').textContent = `Edit Project [${projectsData.tabs[currentTab].display}]`;
            document.getElementById('proj-name-input').value = proj.name;
            document.getElementById('proj-desc-input').value = proj.description;
            document.getElementById('proj-link-input').value = proj.link;
            document.getElementById('project-modal').classList.add('active');
        };

        window.closeProjectModal = () => {
            document.getElementById('project-modal').classList.remove('active');
        };

        window.handleSaveProject = async () => {
            const name = document.getElementById('proj-name-input').value.trim();
            const description = document.getElementById('proj-desc-input').value.trim();
            const link = document.getElementById('proj-link-input').value.trim();
            if (!name || !link) return;

            if (activeEditIdx !== null) {
                const proj = projectsData.tabs[currentTab].projects[activeEditIdx];
                if (proj) {
                    proj.name = name;
                    proj.description = description;
                    proj.link = link;
                }
            } else {
                projectsData.tabs[currentTab].projects.push({ name, description, link });
            }

            closeProjectModal();
            await syncToSupabase();
        };

        window.deleteProject = async (idx) => {
            if (!confirm(`Are you sure you want to delete this project card?`)) return;
            localStorage.removeItem(`proj_pos_${currentTab}_${idx}`);
            
            // Shift pos of items after this so they don't break layout when reloading
            for (let i = idx + 1; i < projectsData.tabs[currentTab].projects.length; i++) {
                const pos = localStorage.getItem(`proj_pos_${currentTab}_${i}`);
                if (pos) {
                    localStorage.setItem(`proj_pos_${currentTab}_${i-1}`, pos);
                    localStorage.removeItem(`proj_pos_${currentTab}_${i}`);
                }
            }
            
            projectsData.tabs[currentTab].projects.splice(idx, 1);
            await syncToSupabase();
        };

        document.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            initAuth();
        });
    </script>
</body>
</html>
