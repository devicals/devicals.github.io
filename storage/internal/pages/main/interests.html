<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interests - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar {
            display: none !important;
        }
        * { 
            border-radius: 0 !important; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        body { margin: 0; box-sizing: border-box; background: transparent; }
        .interest-outer { margin-bottom: 3.5rem; position: relative; }
        .interest-title { color: hsl(var(--accent)); margin-bottom: 1.5rem; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .tilt-wrapper { display: block; perspective: 1000px; user-select: none; position: relative; }
        .interest-fav-list .tilt-wrapper { perspective: 2000px; margin-bottom: 15px; }
        .fav-card, .interest-grid-card { background: rgba(5, 5, 5, 0.85); border: 1px solid hsl(var(--foreground) / 0.3); transition: transform 0.2s ease-out, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease; transform-style: preserve-3d; pointer-events: none; will-change: transform; backface-visibility: hidden; outline: 1px solid transparent; transform: translateZ(1px); }
        .tilt-wrapper:hover .fav-card, .tilt-wrapper:hover .interest-grid-card, .tilt-wrapper.is-tapped .fav-card, .tilt-wrapper.is-tapped .interest-grid-card { border-color: rgba(255, 255, 255, 0.4); background: rgba(255, 255, 255, 0.06); box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 100; }
        body.is-admin .tilt-wrapper { cursor: grab; }
        .fav-card { padding: 35px; display: flex; justify-content: space-between; align-items: center; gap: 20px; overflow: hidden; }
        .fav-title { font-size: 1.4rem; font-weight: 700; color: #fff; transition: transform 0.4s ease; transform-style: preserve-3d; }
        .fav-comment { font-size: 0.85rem; opacity: 0.6; display: block; margin-top: 8px; white-space: pre-wrap; line-height: 1.4; }
        .tilt-wrapper:hover .fav-title, .tilt-wrapper.is-tapped .fav-title { transform: translateZ(25px); }
        .fav-tags { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; max-width: 50%; transform-style: preserve-3d; }
        .tag-box { font-size: 0.7rem; padding: 4px 10px; border: 1px solid; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(10, 10, 10, 0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; will-change: transform; backface-visibility: hidden; outline: 1px solid transparent; }
        .tilt-wrapper:hover .tag-box, .tilt-wrapper.is-tapped .tag-box { transform: translateZ(var(--rand-z, 40px)) translateY(var(--rand-y, -2px)) rotateZ(var(--rand-r, 0deg)); filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.5)); }
        .tag-accent { border-color: hsl(var(--accent)); color: hsl(var(--accent)); }
        .tag-golden { border-color: #ffcc00; color: #ffcc00; }
        .tag-gray { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.6); }
        .interest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .interest-grid .tilt-wrapper { height: 85px; }
        .interest-grid-card { height: 100%; padding: 10px; text-align: center; display: flex; align-items: center; justify-content: center; line-height: 1.2; word-break: break-word; font-size: 0.85rem; color: #ccc; }
        @media (max-width: 1000px) { .interest-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 750px) { .interest-grid { grid-template-columns: repeat(3, 1fr); } .fav-card { flex-direction: column; align-items: flex-start; padding: 25px; } .fav-tags { justify-content: flex-start; max-width: 100%; margin-top: 25px; } }
        @media (max-width: 500px) { .interest-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .admin-action-btn {
            display: none;
            position: absolute;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            pointer-events: auto !important;
            color: hsl(var(--foreground));
        }
        .admin-action-btn:hover {
            color: hsl(var(--accent));
        }
        .admin-action-btn.del-btn {
            color: hsl(var(--muted-foreground));
        }
        .admin-action-btn.del-btn:hover {
            color: hsl(var(--destructive));
        }
        body.is-admin .admin-action-btn {
            display: block;
        }
        .add-grid-item-container {
            display: none;
            width: 100%;
            border: 2px dashed hsl(var(--border));
            padding: 10px;
            margin-bottom: 15px;
            gap: 10px;
        }
        body.is-admin .add-grid-item-container {
            display: flex;
        }
        .add-grid-item-container input {
            flex: 1;
            padding: 8px 12px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-grid-item-container input:focus {
            border-color: hsl(var(--accent));
        }
        .admin-section-btn {
            display: none;
            background: none;
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            margin-bottom: 12px;
        }
        .admin-section-btn:hover {
            border-color: hsl(var(--accent));
            color: hsl(var(--accent));
        }
        body.is-admin .admin-section-btn {
            display: inline-block;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: hsl(var(--card));
            border: 2px solid hsl(var(--border));
            padding: 24px;
            width: 90%;
            max-width: 440px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid hsl(var(--border));
        }
        .modal-header h2 {
            font-size: 16px;
            margin: 0;
            color: hsl(var(--accent));
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: hsl(var(--foreground));
        }
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal input[type=text], .modal textarea, .modal select {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus {
            border-color: hsl(var(--accent));
        }
        .modal select {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal select:focus {
            border-color: hsl(var(--accent));
        }
        .btn-primary {
            background: hsl(var(--accent)) !important;
            color: hsl(var(--accent-foreground)) !important;
            border: 1px solid hsl(var(--accent)) !important;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .grid-add-btn {
            background: hsl(var(--secondary) / 0.3);
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            width: 38px;
            height: 38px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .grid-add-btn:hover {
            background: hsl(var(--accent) / 0.1);
            color: hsl(var(--accent));
            border-color: hsl(var(--accent));
        }
        .grid-add-btn:active {
            transform: scale(0.95);
        }
        .tag-row-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div id="interests-content"></div>
    </div>

    <!-- Edit Favorites Modal -->
    <div id="fav-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title-label">Manage Favorite</h2>
                <button class="modal-close" onclick="closeFavModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="fav-title-input" placeholder="Title">
                <textarea id="fav-comment-input" placeholder="Comment"></textarea>
                
                <div style="border-top:1px dashed hsl(var(--border)); padding-top:12px; display:flex; flex-direction:column; gap:8px;">
                    <label style="font-size:11px; text-transform:uppercase; color:hsl(var(--muted-foreground));">Custom Tags</label>
                    
                    <div class="tag-row-input">
                        <input type="text" id="tag-0-text" placeholder="Tag 1 (e.g. Peak)">
                        <select id="tag-0-style" style="width:120px;">
                            <option value="accent">Accent</option>
                            <option value="golden">Golden</option>
                            <option value="gray">Gray</option>
                        </select>
                    </div>

                    <div class="tag-row-input">
                        <input type="text" id="tag-1-text" placeholder="Tag 2 (e.g. Yummy)">
                        <select id="tag-1-style" style="width:120px;">
                            <option value="accent">Accent</option>
                            <option value="golden">Golden</option>
                            <option value="gray">Gray</option>
                        </select>
                    </div>
                </div>

                <button class="btn-primary" onclick="saveFavorite()" style="width: 100%; padding: 10px; margin-top:5px;">Save Favorite</button>
            </div>
        </div>
    </div>

    <!-- Edit Grid Modal -->
    <div id="edit-grid-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Item</h2>
                <button class="modal-close" onclick="closeEditGridModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="edit-grid-title" placeholder="Item Text">
                <button class="btn-primary" onclick="saveEditGridItem()" style="width: 100%;">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let interestsData = null;
        let contentKey = '';
        let isAdmin = false;
        let activeEditIdx = null;
        let dragItemIdx = null;
        let dragCategory = null;
        
        let currentEditGridCategory = null;
        let currentEditGridIdx = null;

        function randomizeTags(wrapper) {
            wrapper.querySelectorAll('.tag-box').forEach(tag => {
                tag.style.setProperty('--rand-z', `${Math.floor(Math.random() * 50) + 30}px`);
                tag.style.setProperty('--rand-y', `${Math.floor(Math.random() * 12) * -1}px`);
                tag.style.setProperty('--rand-r', `${Math.floor(Math.random() * 24) - 12}deg`);
            });
        }

        function handleTilt(e) {
            const wrapper = e.currentTarget;
            const card = wrapper.querySelector('.fav-card, .interest-grid-card');
            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left, y = clientY - rect.top;
            const centerX = rect.width / 2, centerY = rect.height / 2;
            let rotX, rotY, scale;
            if (card.classList.contains('fav-card')) {
                rotX = Math.max(Math.min((centerY - y) / 15, 7), -7);
                rotY = Math.max(Math.min((x - centerX) / 80, 7), -7);
                scale = 1.03;
            } else {
                rotX = (centerY - y) / 6; rotY = (x - centerX) / 10; scale = 1.1;
            }
            card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(${scale}, ${scale}, ${scale})`;
        }

        function createTiltWrapper(contentClass, innerHTML) {
            const wrap = document.createElement('div');
            wrap.className = 'tilt-wrapper';
            wrap.innerHTML = `<div class="${contentClass}">${innerHTML}</div>`;
            const start = () => { if (contentClass === 'fav-card') randomizeTags(wrap); wrap.classList.add('is-tapped'); };
            wrap.addEventListener('mouseenter', start);
            wrap.addEventListener('touchstart', (e) => { document.querySelectorAll('.is-tapped').forEach(w => w.classList.remove('is-tapped')); start(); handleTilt(e); }, {passive: true});
            wrap.addEventListener('mousemove', handleTilt);
            wrap.addEventListener('touchmove', handleTilt, {passive: true});
            wrap.addEventListener('mouseleave', () => { wrap.querySelector('div').style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1,1,1)`; wrap.classList.remove('is-tapped'); });
            return wrap;
        }

        function fitText(el) {
            let fs = 0.85; el.style.fontSize = fs + 'rem';
            for (let i = 0; i < 4 && el.scrollHeight > el.offsetHeight && fs > 0.5; i++) {
                const ratio = el.offsetHeight / el.scrollHeight;
                fs = Math.max(0.5, fs * ratio * 0.97);
                el.style.fontSize = fs + 'rem';
            }
        }

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        function handleUserSession(session) {
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            if (interestsData) renderPage();
        }

        async function syncToSupabase() {
            if (!isAdmin) return;
            const { error } = await supabaseClient
                .from('site_content')
                .update({ data: interestsData })
                .eq('key', contentKey);
            if (error) {
                alert("Error saving: " + error.message);
            }
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const fileParam = params.get('file');
            if (!fileParam) return;
            
            contentKey = fileParam.split('/').pop().replace('.yaml', '');

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }

            const { data, error } = await supabaseClient
                .from('site_content')
                .select('data')
                .eq('key', contentKey)
                .single();

            if (data && data.data) {
                interestsData = data.data;
                renderPage();
            } else if (error && error.code === 'PGRST116') {
                if (isAdmin) {
                    interestsData = { 
                        favorites: [], 
                        sections: [{ display: "New Section", items: [] }] 
                    };
                    await supabaseClient
                        .from('site_content')
                        .insert({ key: contentKey, data: interestsData });
                    renderPage();
                } else {
                    document.getElementById('interests-content').innerHTML = `
                        <p style="color: hsl(var(--muted-foreground)); font-style: italic; text-align: center; margin-top: 50px;">This interest page is currently empty.</p>
                    `;
                }
            }

            supabaseClient
                .channel('interests-realtime')
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'site_content', filter: `key=eq.${contentKey}` },
                    (payload) => {
                        if (payload.new && payload.new.data) {
                            interestsData = payload.new.data;
                            renderPage();
                        }
                    }
                )
                .subscribe();

            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        function renderPage() {
            const container = document.getElementById('interests-content');
            container.innerHTML = '';

            if (interestsData.favorites) {
                const sec = document.createElement('div');
                sec.className = 'interest-outer';
                sec.innerHTML = `
                    <h2 class="interest-title">Favorites</h2>
                    <button class="admin-section-btn" onclick="openAddFavModal()">+ Add Favorite</button>
                    <div class="interest-fav-list" id="fav-list-container"></div>
                `;
                const list = sec.querySelector('.interest-fav-list');
                
                interestsData.favorites.forEach((fav, idx) => {
                    let tagsHTML = '';
                    const tagList = fav.tags || [];
                    tagList.forEach(t => { tagsHTML += `<span class="tag-box tag-${t.style || 'accent'}">${t.tag}</span>`; });
                    
                    const inner = `
                        <button class="admin-action-btn" id="edit-fav-btn-${idx}" style="top:4px; left:4px;">✎</button>
                        <button class="admin-action-btn del-btn" id="del-fav-btn-${idx}" style="top:4px; right:4px;">✕</button>
                        <div class="fav-info-group">
                            <div class="fav-title">${fav.title}</div>
                            <span class="fav-comment">${fav.comment || ''}</span>
                        </div>
                        <div class="fav-tags">${tagsHTML}</div>
                    `;
                    
                    const wrap = createTiltWrapper('fav-card', inner);
                    wrap.dataset.index = idx;

                    if (isAdmin) {
                        wrap.draggable = true;
                        wrap.addEventListener('dragstart', (e) => {
                            dragItemIdx = idx;
                            dragCategory = 'favorites';
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        wrap.addEventListener('dragover', (e) => {
                            if (dragCategory !== 'favorites') return;
                            e.preventDefault();
                        });
                        wrap.addEventListener('drop', async (e) => {
                            if (dragCategory !== 'favorites') return;
                            e.preventDefault();
                            const targetIdx = idx;
                            if (dragItemIdx === targetIdx) return;
                            const [reorderedItem] = interestsData.favorites.splice(dragItemIdx, 1);
                            interestsData.favorites.splice(targetIdx, 0, reorderedItem);
                            await syncToSupabase();
                        });
                    }

                    list.appendChild(wrap);

                    const delBtn = document.getElementById(`del-fav-btn-${idx}`);
                    if (delBtn) {
                        delBtn.onclick = (e) => { e.stopPropagation(); deleteFavorite(idx); };
                    }

                    const editBtn = document.getElementById(`edit-fav-btn-${idx}`);
                    if (editBtn) {
                        editBtn.onclick = (e) => { e.stopPropagation(); openEditFavModal(fav, idx); };
                    }
                });
                container.appendChild(sec);
            }

            if (interestsData.sections) {
                interestsData.sections.forEach((s, secIdx) => {
                    const sec = document.createElement('div');
                    sec.className = 'interest-outer';
                    sec.innerHTML = `
                        <h2 class="interest-title">${s.display}</h2>
                        <div class="add-grid-item-container">
                            <input type="text" id="add-item-input-${secIdx}" placeholder="Add item to '${s.display}' list...">
                            <button class="grid-add-btn" onclick="addGridItem(${secIdx})">+</button>
                        </div>
                        <div class="interest-grid" id="grid-container-${secIdx}"></div>
                    `;
                    const grid = sec.querySelector('.interest-grid');
                    
                    s.items.forEach((item, idx) => {
                        const inner = `
                            <button class="admin-action-btn" style="top:5px; left:5px; font-size:10px;" id="grid-edit-${secIdx}-${idx}">✎</button>
                            <button class="admin-action-btn del-btn" style="top:5px; right:5px; font-size:10px;" id="grid-del-${secIdx}-${idx}">✕</button>
                            ${item}
                        `;
                        
                        const wrap = createTiltWrapper('interest-grid-card', inner);
                        wrap.dataset.index = idx;

                        if (isAdmin) {
                            wrap.draggable = true;
                            wrap.addEventListener('dragstart', (e) => {
                                dragItemIdx = idx;
                                dragCategory = `section-${secIdx}`;
                                e.dataTransfer.effectAllowed = 'move';
                            });
                            wrap.addEventListener('dragover', (e) => {
                                if (dragCategory !== `section-${secIdx}`) return;
                                e.preventDefault();
                            });
                            wrap.addEventListener('drop', async (e) => {
                                if (dragCategory !== `section-${secIdx}`) return;
                                e.preventDefault();
                                const targetIdx = idx;
                                if (dragItemIdx === targetIdx) return;
                                const [reorderedItem] = interestsData.sections[secIdx].items.splice(dragItemIdx, 1);
                                interestsData.sections[secIdx].items.splice(targetIdx, 0, reorderedItem);
                                await syncToSupabase();
                            });
                        }

                        grid.appendChild(wrap);

                        const delBtn = document.getElementById(`grid-del-${secIdx}-${idx}`);
                        if (delBtn) {
                            delBtn.onclick = (e) => { e.stopPropagation(); deleteGridItem(secIdx, idx); };
                        }

                        const editBtn = document.getElementById(`grid-edit-${secIdx}-${idx}`);
                        if (editBtn) {
                            editBtn.onclick = (e) => { e.stopPropagation(); editGridItem(secIdx, idx); };
                        }
                    });
                    container.appendChild(sec);
                });
            }
            document.querySelectorAll('.interest-grid-card').forEach(fitText);
        }

        window.openAddFavModal = () => {
            activeEditIdx = null;
            document.getElementById('fav-title-input').value = '';
            document.getElementById('fav-comment-input').value = '';
            document.getElementById('tag-0-text').value = '';
            document.getElementById('tag-0-style').value = 'accent';
            document.getElementById('tag-1-text').value = '';
            document.getElementById('tag-1-style').value = 'accent';
            document.getElementById('fav-modal').classList.add('active');
        };

        function openEditFavModal(fav, idx) {
            activeEditIdx = idx;
            document.getElementById('fav-title-input').value = fav.title;
            document.getElementById('fav-comment-input').value = fav.comment || '';
            
            const tag0 = fav.tags?.[0] || { tag: '', style: 'accent' };
            const tag1 = fav.tags?.[1] || { tag: '', style: 'accent' };
            
            document.getElementById('tag-0-text').value = tag0.tag;
            document.getElementById('tag-0-style').value = tag0.style;
            document.getElementById('tag-1-text').value = tag1.tag;
            document.getElementById('tag-1-style').value = tag1.style;
            
            document.getElementById('fav-modal').classList.add('active');
        }

        window.closeFavModal = () => {
            document.getElementById('fav-modal').classList.remove('active');
        };

        window.saveFavorite = async () => {
            const title = document.getElementById('fav-title-input').value.trim();
            const comment = document.getElementById('fav-comment-input').value.trim();
            if (!title) return;

            const tags = [];
            const tag0Text = document.getElementById('tag-0-text').value.trim();
            const tag1Text = document.getElementById('tag-1-text').value.trim();
            
            if (tag0Text) {
                tags.push({ tag: tag0Text, style: document.getElementById('tag-0-style').value });
            }
            if (tag1Text) {
                tags.push({ tag: tag1Text, style: document.getElementById('tag-1-style').value });
            }

            const favObj = { title, comment, tags };

            if (activeEditIdx !== null) {
                interestsData.favorites[activeEditIdx] = favObj;
            } else {
                if (!interestsData.favorites) interestsData.favorites = [];
                interestsData.favorites.push(favObj);
            }

            closeFavModal();
            await syncToSupabase();
        };

        async function deleteFavorite(idx) {
            if (!confirm(`Are you sure you want to delete this favorite?`)) return;
            interestsData.favorites = interestsData.favorites.filter((_, i) => i !== idx);
            await syncToSupabase();
        }

        window.addGridItem = async (secIdx) => {
            const input = document.getElementById(`add-item-input-${secIdx}`);
            const val = input.value.trim();
            if (!val) return;
            interestsData.sections[secIdx].items.push(val);
            input.value = '';
            await syncToSupabase();
        };

        async function deleteGridItem(secIdx, idx) {
            if (!confirm(`Are you sure you want to delete this item?`)) return;
            interestsData.sections[secIdx].items = interestsData.sections[secIdx].items.filter((_, i) => i !== idx);
            await syncToSupabase();
        }

        window.editGridItem = (secIdx, idx) => {
            currentEditGridCategory = secIdx;
            currentEditGridIdx = idx;
            const currentVal = interestsData.sections[secIdx].items[idx];
            document.getElementById('edit-grid-title').value = currentVal;
            document.getElementById('edit-grid-modal').classList.add('active');
        };
        
        window.closeEditGridModal = () => document.getElementById('edit-grid-modal').classList.remove('active');
        
        window.saveEditGridItem = async () => {
            const newVal = document.getElementById('edit-grid-title').value.trim();
            if (newVal) {
                interestsData.sections[currentEditGridCategory].items[currentEditGridIdx] = newVal;
                await syncToSupabase();
            }
            closeEditGridModal();
        };

        document.addEventListener('touchstart', (e) => {
            if (!e.target.closest('.tilt-wrapper')) document.querySelectorAll('.is-tapped').forEach(w => w.classList.remove('is-tapped'));
        }, {passive: true});

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
