<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        * { scrollbar-width: none !important; -ms-overflow-style: none !important; }
        body { 
            margin: 0; 
            box-sizing: border-box; 
            height: 100vh; 
            overflow: auto;
            background: transparent;
        }

        .blog-content { word-wrap: break-word; line-height: 1.6; font-size: 13px; }
        
        .admin-action-row {
            display: none;
            gap: 8px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed hsl(var(--border));
        }
        body.is-admin .admin-action-row {
            display: flex;
        }
        .admin-btn {
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            cursor: pointer;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
        }
        .admin-btn:hover {
            border-color: hsl(var(--accent));
            color: hsl(var(--accent));
        }
        .admin-btn.danger-btn {
            color: hsl(var(--destructive));
            border-color: hsl(var(--destructive) / 0.4);
        }
        .admin-btn.danger-btn:hover {
            border-color: hsl(var(--destructive));
            background: hsl(var(--destructive) / 0.05);
        }
        .shiki-container { background: #121212; border: 1px solid #2d2e2e; margin: 1.5rem 0; overflow: hidden; }
        .shiki-header { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem; background: #181818; border-bottom: 1px solid #2d2e2e; }
        .shiki-lang { color: #7e7e7e; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }
        .shiki-actions { display: flex; gap: 8px; }
        .shiki-btn { background: transparent; border: 1px solid #2d2e2e; color: #7e7e7e; padding: 4px 10px; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: all 0.2s ease; }
        .shiki-btn:hover { border-color: #dbd7ca; color: #dbd7ca; }
        .shiki-btn.active { border-color: #4d937b; color: #4d937b; }
        .shiki-container pre.shiki { margin: 0 !important; border: none !important; padding: 1rem !important; background-color: transparent !important; white-space: pre; overflow-x: auto; }
        .shiki-container.wrap-enabled pre.shiki { white-space: pre-wrap; word-break: break-all; }
        code.shiki-inline { background: #121212 !important; padding: 3px 6px !important; border: 1px solid #2d2e2e !important; font-family: 'JetBrains Mono', monospace !important; display: inline-block; vertical-align: middle; }
        
        #add-blog-container {
            display: none;
            padding: 15px;
            padding-bottom: 0;
        }
        body.is-admin #add-blog-container {
            display: block;
        }
    </style>
</head>
<body>
    
    <div style="padding: 15px; border-bottom: 1px dashed hsl(var(--border)); display: flex; gap: 10px; align-items: center; background: rgba(0,0,0,0.2);">
        <label style="font-size:10px; color:hsl(var(--accent)); font-weight: bold;">JUMP TO ID:</label>
        <input type="number" id="blog-id-input" class="ascii-input" style="width:80px; margin: 0; padding: 4px;" placeholder="ID">
        <button onclick="window.jumpToBlog()" class="ascii-btn" style="border: 1px solid hsl(var(--border)); padding: 4px 10px;">Go</button>
        <button onclick="window.copyRSS()" class="ascii-btn" id="rss-btn" style="border: 1px solid hsl(var(--border)); padding: 4px 10px;">RSS URL</button>
    </div>

    <div id="add-blog-container">
        <button class="admin-btn" style="padding:10px 20px; font-size:13px; border-style:dashed; width: 100%;" onclick="openAddBlogModal()">+ Create New Blog</button>
    </div>

    <div id="tab-container" style="padding: 15px; display: flex; flex-direction: column; gap: 20px;"></div>

    <div id="blog-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title-label">Create Blog Post</h2>
                <button class="modal-close" onclick="closeBlogModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="blog-title-input" class="ascii-input" placeholder="Title">
                <textarea id="blog-content-input" placeholder="Content (Markdown supported)"></textarea>
                <button class="btn-primary" id="blog-save-submit" style="width: 100%; padding: 10px;">Save Post</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { codeToHtml } from 'https://esm.sh/shiki@1.0.0';

        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let blogsData = [];
        let isAdmin = false;
        let activeEditId = null;
        let isShikiWrapEnabled = localStorage.getItem('shikiWrapEnabled') !== 'false';
        let currentRenderId = 0;

        marked.use({
            breaks: true, gfm: true, async: true,
            async walkTokens(token) {
                if (token.type === 'code') {
                    const shikiHtml = await codeToHtml(token.text, { lang: token.lang || 'text', theme: 'vitesse-dark' });
                    const header = `<div class="shiki-header"><span class="shiki-lang">${token.lang || 'text'}</span><div class="shiki-actions"><button class="shiki-btn wrap-btn">Wrap</button><button class="shiki-btn copy-btn">Copy</button></div></div>`;
                    token.type = 'html';
                    token.text = `<div class="shiki-container">${header}${shikiHtml}</div>`;
                } else if (token.type === 'codespan') {
                    const raw = await codeToHtml(token.text, { lang: 'text', theme: 'vitesse-dark' });
                    const inline = raw.replace(/<pre[^>]*>/, '').replace('</pre>', '').replace('<code', '<code class="shiki-inline"');
                    token.type = 'html';
                    token.text = inline;
                }
            }
        });

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        window.addEventListener('message', e => {
            if (e.data && e.data.type === 'auth-sync') {
                handleUserSession(e.data.session);
            } else if (e.data && e.data.type === 'hash-updated') {
                const hash = e.data.args;
                const params = new URLSearchParams(hash);
                const id = params.get('id');
                if (id) scrollToBlogId(id);
            }
        });

        function handleUserSession(session) {
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            renderBlogs(blogsData);
        }

        function parseDate(dateStr) {
            const [day, month, year] = dateStr.split('/').map(Number);
            return new Date(year, month - 1, day);
        }

        async function renderBlogs(blogs) {
            const renderId = ++currentRenderId;
            const container = document.getElementById('tab-container');
            container.innerHTML = '';

            const parsedContent = await Promise.all(blogs.map(b => marked.parse(b.content)));
            
            if (renderId !== currentRenderId) return;

            blogs.forEach((blog, idx) => {
                const htmlContent = parsedContent[idx];
                const card = document.createElement('div');
                card.className = 'blog-post';
                card.id = `blog-${blog.id}`;
                card.style.background = 'hsl(var(--card))';
                card.style.border = '1px solid hsl(var(--border))';
                card.style.padding = '24px';
                card.style.position = 'relative';

                card.innerHTML = `
                    <div class="blog-id" style="position: absolute; top: 24px; right: 24px; font-size: 12px; color: hsl(var(--muted-foreground)); font-weight: 600;">#${blog.id}</div>
                    <div class="blog-header" style="border-bottom: 1px dashed hsl(var(--border)); padding-bottom: 10px; margin-bottom: 15px;">
                        <a href="#" class="blog-title" id="title-anchor-${blog.id}" style="color: hsl(var(--accent)); font-weight: bold; font-size: 18px; text-decoration: none;">${blog.title}</a>
                        <div class="blog-date" style="font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 4px;">${blog.date}</div>
                    </div>
                    <div class="blog-content">${htmlContent}</div>
                    <div class="admin-action-row">
                        <button class="admin-btn" id="edit-btn-${blog.id}">Edit</button>
                        <button class="admin-btn danger-btn" id="del-btn-${blog.id}">Delete</button>
                    </div>
                `;
                container.appendChild(card);

                const titleAnchor = document.getElementById(`title-anchor-${blog.id}`);
                if (titleAnchor) titleAnchor.onclick = (e) => window.copyBlogLink(e, blog.id);

                const editBtn = document.getElementById(`edit-btn-${blog.id}`);
                if (editBtn) editBtn.onclick = () => openEditBlogModal(blog);

                const delBtn = document.getElementById(`del-btn-${blog.id}`);
                if (delBtn) delBtn.onclick = () => deleteBlogPost(blog.id);
            });

            setupShikiInteractions();
            
            const params = new URLSearchParams(window.location.hash.substring(1));
            const id = params.get('id');
            if (id) setTimeout(() => scrollToBlogId(id), 500);
        }

        function setupShikiInteractions() {
            document.querySelectorAll('.shiki-container').forEach(container => {
                const wrapBtn = container.querySelector('.wrap-btn');
                if (isShikiWrapEnabled) {
                    container.classList.add('wrap-enabled');
                    if (wrapBtn) { wrapBtn.classList.add('active'); wrapBtn.textContent = 'Wrap: On'; }
                } else {
                    if (wrapBtn) wrapBtn.textContent = 'Wrap: Off';
                }
            });
        }

        function scrollToBlogId(id) {
            const el = document.getElementById(`blog-${id}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.borderColor = 'hsl(var(--accent))';
                setTimeout(() => el.style.borderColor = 'hsl(var(--border))', 2000);
            } else {
                alert(`Blog #${id} not found.`);
            }
        }

        async function syncToSupabase() {
            const { error } = await supabaseClient
                .from('site_content')
                .update({ data: blogsData })
                .eq('key', 'blogs');
            if (error) {
                alert("Error saving: " + error.message);
            }
        }

        window.openAddBlogModal = () => {
            activeEditId = null;
            document.getElementById('modal-title-label').textContent = "Create Blog Post";
            document.getElementById('blog-title-input').value = "";
            document.getElementById('blog-content-input').value = "";
            document.getElementById('blog-modal').classList.add('active');
        };

        window.openEditBlogModal = (blog) => {
            activeEditId = blog.id;
            document.getElementById('modal-title-label').textContent = `Edit Blog Post #${blog.id}`;
            document.getElementById('blog-title-input').value = blog.title;
            document.getElementById('blog-content-input').value = blog.content;
            document.getElementById('blog-modal').classList.add('active');
        };

        window.closeBlogModal = () => {
            document.getElementById('blog-modal').classList.remove('active');
        };

        window.handleSaveBlog = async () => {
            const title = document.getElementById('blog-title-input').value.trim();
            const content = document.getElementById('blog-content-input').value.trim();
            if (!title || !content) return;

            if (activeEditId !== null) {
                const blog = blogsData.find(b => b.id === activeEditId);
                if (blog) {
                    blog.title = title;
                    blog.content = content;
                }
            } else {
                const nextId = blogsData.length > 0 ? Math.max(...blogsData.map(b => b.id)) + 1 : 1;
                const today = new Date();
                const dateStr = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;
                
                blogsData.unshift({
                    id: nextId,
                    date: dateStr,
                    title,
                    content
                });
            }

            closeBlogModal();
            await syncToSupabase();
        };

        window.deleteBlogPost = async (id) => {
            if (!confirm(`Are you sure you want to delete Blog Post #${id}?`)) return;
            blogsData = blogsData.filter(b => b.id !== id);
            await syncToSupabase();
        };

        document.addEventListener('click', (e) => {
            if (e.target.matches('.shiki-btn.copy-btn')) {
                const container = e.target.closest('.shiki-container');
                const codeBlock = container?.querySelector('pre.shiki code');
                if (codeBlock) {
                    navigator.clipboard.writeText(codeBlock.innerText).then(() => {
                        e.target.textContent = 'Copied!';
                        setTimeout(() => e.target.textContent = 'Copy', 2000);
                    });
                }
            }
            if (e.target.matches('.shiki-btn.wrap-btn')) {
                isShikiWrapEnabled = !isShikiWrapEnabled;
                localStorage.setItem('shikiWrapEnabled', isShikiWrapEnabled);
                document.querySelectorAll('.shiki-container').forEach(container => {
                    const wrapBtn = container.querySelector('.wrap-btn');
                    container.classList.toggle('wrap-enabled', isShikiWrapEnabled);
                    if (wrapBtn) {
                        wrapBtn.classList.toggle('active', isShikiWrapEnabled);
                        wrapBtn.textContent = isShikiWrapEnabled ? 'Wrap: On' : 'Wrap: Off';
                    }
                });
            }
        });

        window.copyBlogLink = (e, id) => { e.preventDefault(); const url = `https://devicals.github.io/#page=blogs&id=${id}`; navigator.clipboard.writeText(url).then(() => { e.target.textContent = "Link Copied!"; setTimeout(() => { e.target.textContent = blogsData.find(b=>b.id===id).title; }, 2000); }); document.getElementById(`blog-${id}`).scrollIntoView({ behavior: 'smooth', block: 'center' }); };
        window.jumpToBlog = () => { 
            const id = document.getElementById('blog-id-input').value; 
            if (!id) return; 
            scrollToBlogId(id);
        };
        window.copyRSS = () => { const url = "https://github.com/devicals/devicals.github.io/raw/refs/heads/main/storage/internal/blogs.xml"; navigator.clipboard.writeText(url).then(() => { const btn = document.getElementById('rss-btn'); btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'RSS URL'; }, 2000); }); };

        document.getElementById('blog-save-submit').onclick = handleSaveBlog;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const { data, error } = await supabaseClient
                    .from('site_content')
                    .select('data')
                    .eq('key', 'blogs')
                    .single();

                if (data && data.data) {
                    blogsData = data.data.sort((a, b) => parseDate(b.date) - parseDate(a.date));
                    await renderBlogs(blogsData);
                }

                supabaseClient
                    .channel('blogs-realtime')
                    .on(
                        'postgres_changes',
                        { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.blogs' },
                        async (payload) => {
                            if (payload.new && payload.new.data) {
                                blogsData = payload.new.data.sort((a, b) => parseDate(b.date) - parseDate(a.date));
                                await renderBlogs(blogsData);
                            }
                        }
                    )
                    .subscribe();

                await initAuth();
            } catch (error) { console.error(error); }
        });
    </script>
</body>
</html>
