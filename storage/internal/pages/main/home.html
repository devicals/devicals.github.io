<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        * { border-radius: 0 !important; scrollbar-width: none !important; -ms-overflow-style: none !important; }
        
        .admin-action-btn { display: none; position: absolute; background: none; border: none; cursor: pointer; z-index: 10; pointer-events: auto !important; color: hsl(var(--foreground)); }
        .admin-action-btn:hover { color: hsl(var(--accent)); }
        .admin-action-btn.del-btn { color: hsl(var(--muted-foreground)); }
        .admin-action-btn.del-btn:hover { color: hsl(var(--destructive)); }
        body.is-admin .admin-action-btn { display: block; }
        
        .add-grid-item-container { display: none; width: 100%; border: 1px dashed hsl(var(--border)); padding: 10px; margin-bottom: 15px; gap: 10px; }
        body.is-admin .add-grid-item-container { display: flex; }
        .add-grid-item-container input { flex: 1; padding: 8px 12px; background: hsla(var(--secondary), 0.5); border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); font-family: inherit; outline: none; }
        .add-grid-item-container input:focus { border-color: hsl(var(--accent)); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: hsl(var(--card)); border: 1px solid hsl(var(--foreground)); padding: 24px; width: 90%; max-width: 500px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed hsl(var(--border)); }
        .modal-header h2 { font-size: 14px; margin: 0; color: hsl(var(--accent)); text-transform: uppercase; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: hsl(var(--foreground)); }
        .modal-body { display: flex; flex-direction: column; gap: 12px; }
        .modal textarea { width: 100%; padding: 10px; background: hsl(var(--secondary)); border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); font-family: inherit; font-size: 13px; outline: none; min-height: 250px; resize: vertical; }
        .modal textarea:focus { border-color: hsl(var(--accent)); }
        .btn-primary { background: hsl(var(--accent)) !important; color: hsl(var(--accent-foreground)) !important; border: 1px solid hsl(var(--accent)) !important; padding: 10px 20px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; text-transform: uppercase; }
        .btn-primary:hover { opacity: 0.9; }
        .grid-add-btn { background: hsla(var(--secondary), 0.5); border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); width: 38px; height: 38px; font-size: 18px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .grid-add-btn:hover { background: hsla(var(--accent), 0.1); color: hsl(var(--accent)); border-color: hsl(var(--accent)); }
        
        body.is-admin .admin-edit-only { display: inline-block; }
        .admin-edit-only { display: none; }
    </style>
</head>
<body>
    <div class="desktop-area" id="desktop">
        <!-- Windows will be injected here -->
    </div>

    <!-- Biography Modal -->
    <div id="bio-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>+---[ Edit_Bio.exe ]---+</h2>
                <button class="modal-close" onclick="closeBioModal()">✕</button>
            </div>
            <div class="modal-body">
                <textarea id="bio-textarea-input" placeholder="Biography Markdown..."></textarea>
                <button class="btn-primary" onclick="saveBio()" style="width: 100%; padding: 10px;">[ Execute Save ]</button>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let homeData = null;
        let isAdmin = false;
        let dragItemIdx = null;
        let dragCategory = null;
        let highestZ = 100;

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => handleUserSession(session));
        }

        function handleUserSession(session) {
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            if (homeData) renderPage();
        }

        function parseDate(dateStr) {
            const [day, month, year] = dateStr.split('/').map(Number);
            return new Date(year, month - 1, day);
        }

        async function fetchDiscordData(userId) {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
                const statusData = await response.json();
                if (!statusData.success) throw new Error('Lanyard failed');
                const statusMap = { 'online': 'Online', 'dnd': 'DND', 'idle': 'Idle', 'offline': 'Offline' };
                return { statusText: statusMap[statusData.data?.discord_status || 'offline'] || 'Offline' };
            } catch (error) { return { statusText: "Offline" }; }
        }

        async function initDatabase() {
            const { data } = await supabaseClient.from('site_content').select('data').eq('key', 'home').single();
            if (data && data.data) {
                homeData = data.data;
                renderPage();
            }
            supabaseClient.channel('home-realtime')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.home' }, (payload) => {
                    if (payload.new && payload.new.data) { homeData = payload.new.data; renderPage(); }
                }).subscribe();
        }

        async function syncToSupabase() {
            if (!isAdmin) return;
            const { error } = await supabaseClient.from('site_content').update({ data: homeData }).eq('key', 'home');
            if (error) alert("Error saving: " + error.message);
        }

        function makeDraggable(el) {
            const header = el.querySelector('.ascii-header');
            if (!header) return;
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            header.onmousedown = dragMouseDown;
            header.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target.tagName === 'BUTTON') return;
                e.preventDefault();
                el.style.zIndex = ++highestZ;
                if (e.type === 'touchstart') {
                    pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY;
                } else {
                    pos3 = e.clientX; pos4 = e.clientY;
                }
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                let clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - clientX; pos2 = pos4 - clientY;
                pos3 = clientX; pos4 = clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
                document.ontouchend = null; document.ontouchmove = null;
            }
            
            el.addEventListener('mousedown', () => { el.style.zIndex = ++highestZ; });
        }

        function createWindow(id, title, contentHTML, bounds, adminControls = '') {
            let win = document.getElementById(id);
            const isNew = !win;
            if (isNew) {
                win = document.createElement('div');
                win.id = id;
                win.className = 'ascii-window';
                win.style.left = bounds.left;
                win.style.top = bounds.top;
                win.style.width = bounds.width;
                if (bounds.height) win.style.height = bounds.height;
                document.getElementById('desktop').appendChild(win);
            }
            
            win.innerHTML = `
                <div class="ascii-header">
                    <span class="ascii-header-title">+--[ ${title} ]--+</span>
                    <div class="ascii-controls">
                        ${adminControls}
                    </div>
                </div>
                <div class="ascii-body">
                    ${contentHTML}
                </div>
            `;
            
            if (isNew && window.innerWidth > 768) makeDraggable(win);
            return win;
        }

        async function renderPage() {
            // Bio Window
            let bioHTML = `<div class="bio-card" style="line-height:1.8;">${marked.parse(homeData.bio || '')}</div>`;
            createWindow('win-bio', 'about_me.txt', bioHTML, {left: '5%', top: '5%', width: '420px'}, 
                `<button class="ascii-btn admin-edit-only" onclick="openBioModal()">[ Edit ]</button>`);

            // Skills Window
            let skillsHTML = `<div class="add-grid-item-container">
                <input type="text" id="skill-name-input" placeholder="Skill Name">
                <input type="text" id="skill-link-input" placeholder="URL (opt)">
                <button class="grid-add-btn" onclick="addNewSkill()">+</button>
            </div><div class="skills-grid" id="skills-grid-content"></div>`;
            
            createWindow('win-skills', 'sys_skills.exe', skillsHTML, {left: '55%', top: '5%', width: '380px'});
            renderGridItems(homeData.skills, 'skills-grid-content', 'skills', (item) => item.skill, (item) => item.link);

            // Socials Window
            let socialsHTML = `<div class="add-grid-item-container">
                <input type="text" id="social-name-input" placeholder="Social Name">
                <input type="text" id="social-link-input" placeholder="Profile URL">
                <button class="grid-add-btn" onclick="addNewSocial()">+</button>
            </div><div class="socials-grid" id="socials-grid-content"></div>`;
            
            createWindow('win-socials', 'network.dat', socialsHTML, {left: '60%', top: '55%', width: '320px'});
            renderGridItems(homeData.socials, 'socials-grid-content', 'socials', (item) => item.name, (item) => item.link);
            refreshDiscordUI();

            // Blog Window
            loadLatestBlogPreview();
        }

        function renderGridItems(arr, containerId, category, textMapper, linkMapper) {
            const grid = document.getElementById(containerId);
            if (!grid) return;
            grid.innerHTML = '';
            arr.forEach((item, idx) => {
                const link = linkMapper(item);
                const card = document.createElement(link ? 'a' : 'div');
                card.className = (category === 'skills' ? 'skill-card' : 'social-card') + (link ? ' skill-card-link' : '');
                if (link) { card.href = link; card.target = '_blank'; }
                card.innerHTML = `
                    <button class="admin-action-btn" style="top:5px; left:5px; font-size:10px;" onclick="editGridItem('${category}', ${idx}, event)">✎</button>
                    <button class="admin-action-btn del-btn" style="top:5px; right:5px; font-size:10px;" onclick="deleteGridItem('${category}', ${idx}, event)">✕</button>
                    ${textMapper(item)}
                `;
                if (isAdmin) {
                    card.draggable = true;
                    card.addEventListener('dragstart', (e) => { dragItemIdx = idx; dragCategory = category; e.dataTransfer.effectAllowed = 'move'; });
                    card.addEventListener('dragover', (e) => e.preventDefault());
                    card.addEventListener('drop', async (e) => {
                        e.preventDefault(); if (dragCategory !== category) return;
                        if (dragItemIdx === idx) return;
                        const targetArr = homeData[category];
                        const [reorderedItem] = targetArr.splice(dragItemIdx, 1);
                        targetArr.splice(idx, 0, reorderedItem);
                        await syncToSupabase();
                    });
                }
                grid.appendChild(card);
            });
        }

        window.openBioModal = () => {
            document.getElementById('bio-textarea-input').value = homeData.bio || '';
            document.getElementById('bio-modal').classList.add('active');
        };
        window.closeBioModal = () => document.getElementById('bio-modal').classList.remove('active');
        window.saveBio = async () => {
            const bioText = document.getElementById('bio-textarea-input').value.trim();
            if (!bioText) return;
            homeData.bio = bioText;
            closeBioModal();
            await syncToSupabase();
        };

        window.addNewSkill = async () => {
            const n = document.getElementById('skill-name-input').value.trim();
            const l = document.getElementById('skill-link-input').value.trim() || null;
            if (!n) return;
            homeData.skills.push({ skill: n, link: l });
            await syncToSupabase();
        };
        window.addNewSocial = async () => {
            const n = document.getElementById('social-name-input').value.trim();
            const l = document.getElementById('social-link-input').value.trim();
            if (!n || !l) return;
            homeData.socials.push({ name: n, link: l });
            await syncToSupabase();
        };

        window.deleteGridItem = async (category, idx, e) => {
            e.stopPropagation(); e.preventDefault();
            if (!confirm(`Delete item?`)) return;
            homeData[category].splice(idx, 1);
            await syncToSupabase();
        };

        window.editGridItem = async (category, idx, e) => {
            e.stopPropagation(); e.preventDefault();
            const item = homeData[category][idx];
            const currentName = category === 'skills' ? item.skill : item.name;
            const name = prompt("Edit Name:", currentName);
            if (name && name.trim() !== '') {
                const link = prompt("Edit Link:", item.link || '');
                if (category === 'skills') item.skill = name.trim(); else item.name = name.trim();
                item.link = link ? link.trim() : null;
                await syncToSupabase();
            }
        };

        async function fetchDiscordData(userId) {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
                const statusData = await response.json();
                if (!statusData.success) throw new Error('Lanyard failed');
                const statusMap = { 'online': 'Online', 'dnd': 'DND', 'idle': 'Idle', 'offline': 'Offline' };
                return { statusText: statusMap[statusData.data?.discord_status || 'offline'] || 'Offline' };
            } catch (error) { return { statusText: "Offline" }; }
        }

        async function refreshDiscordUI() {
            const DISCORD_ID = '989414384679927838';
            const socialsGrid = document.getElementById('socials-grid-content');
            if (!socialsGrid) return;
            const data = await fetchDiscordData(DISCORD_ID);
            let discordCard = document.getElementById('discord-live-card');
            if (!discordCard) {
                discordCard = document.createElement('a');
                discordCard.id = 'discord-live-card';
                discordCard.className = 'social-card discord-status';
                discordCard.target = '_blank';
                discordCard.href = `https://discord.com/users/${DISCORD_ID}/`;
                socialsGrid.prepend(discordCard);
            }
            discordCard.textContent = `${data.statusText} on Discord`;
        }

        async function loadLatestBlogPreview() {
            try {
                const { data } = await supabaseClient.from('site_content').select('data').eq('key', 'blogs').single();
                if (data && data.data && data.data.length > 0) {
                    const sortedBlogs = data.data.sort((a, b) => parseDate(b.date) - parseDate(a.date));
                    const latest = sortedBlogs[0];
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = marked.parse(latest.content);
                    let excerpt = (tempDiv.textContent || tempDiv.innerText || "").trim();
                    if (excerpt.length > 100) excerpt = excerpt.substring(0, 100).replace(/[ ,.]*$/, "") + "...";
                    
                    const html = `
                        <div class="blog-preview-card" style="cursor: pointer;" onclick="window.parent.location.hash = 'page=blogs&id=${latest.id}'">
                            <div class="preview-title">${latest.title}</div>
                            <div class="preview-date">${latest.date}</div>
                            <div class="preview-excerpt">${excerpt}</div>
                        </div>
                    `;
                    createWindow('win-blog', 'latest_log.md', html, {left: '5%', top: '65%', width: '450px'});
                }
            } catch (e) { console.error(e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            initAuth();
        });
    </script>
</body>
</html>
