<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { display: none !important; }
        * { border-radius: 0 !important; scrollbar-width: none !important; -ms-overflow-style: none !important; }
        body { 
            margin: 0; 
            box-sizing: border-box; 
            height: 100vh; 
            overflow: hidden;
            background: transparent;
        }

        .admin-action-row {
            display: none;
            gap: 8px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed hsl(var(--border));
        }
        body.is-admin .admin-action-row {
            display: flex;
        }
        .admin-btn {
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            cursor: pointer;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            flex: 1;
        }
        .admin-btn:hover {
            border-color: hsl(var(--accent));
            color: hsl(var(--accent));
        }
        .admin-btn.danger-btn {
            color: hsl(var(--destructive));
            border-color: hsl(var(--destructive) / 0.4);
        }
        .admin-btn.danger-btn:hover {
            border-color: hsl(var(--destructive));
            background: hsl(var(--destructive) / 0.05);
        }
        #add-download-container {
            display: none;
            padding: 15px;
            padding-bottom: 0;
        }
        body.is-admin #add-download-container {
            display: block;
        }
        #copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div id="copy-toast">LINK COPIED TO CLIPBOARD</div>
    
    <div id="add-download-container">
        <button class="admin-btn" style="padding:10px 20px; font-size:13px; border-style:dashed; width: 100%;" onclick="openAddDownloadModal()">+ Add Download</button>
    </div>

    <div id="tab-container" style="position: relative; flex: 1; overflow: auto; min-height: 500px;"></div>

    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let downloadsData = [];
        let isAdmin = false;
        let highestZ = 10;

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        window.addEventListener('message', e => {
            if (e.data && e.data.type === 'auth-sync') {
                handleUserSession(e.data.session);
            } else if (e.data && e.data.type === 'hash-updated') {
                handleHash(e.data.args);
            } else if (e.data && e.data.type === 'reset-inner-positions') {
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('dl_pos_')) {
                        localStorage.removeItem(key);
                    }
                });
                renderDownloads();
            }
        });

        function handleUserSession(session) {
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            renderDownloads();
        }

        async function initDatabase() {
            const { data, error } = await supabaseClient
                .from('site_content')
                .select('data')
                .eq('key', 'downloads')
                .single();

            if (data && data.data) {
                downloadsData = data.data;
                renderDownloads();
            }

            supabaseClient
                .channel('downloads-realtime')
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.downloads' },
                    (payload) => {
                        if (payload.new && payload.new.data) {
                            downloadsData = payload.new.data;
                            renderDownloads();
                        }
                    }
                )
                .subscribe();
        }

        async function syncToSupabase() {
            if (!isAdmin) return;
            const { error } = await supabaseClient
                .from('site_content')
                .update({ data: downloadsData })
                .eq('key', 'downloads');
            if (error) {
                alert("Error saving: " + error.message);
            }
        }

        function renderDownloads() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            
            downloadsData.forEach((download, idx) => {
                const card = document.createElement('div');
                card.className = 'ascii-window download-card-window';
                card.id = `download-${download.id}`;
                card.dataset.index = idx;
                card.style.width = '340px';
                card.style.height = '160px';
                card.style.position = 'absolute';
                
                card.innerHTML = `
                    <div class="ascii-header-row card-drag-handle" style="cursor: move;">
                        <div class="ascii-header-line" style="width: 15px;"></div>
                        <div class="ascii-title" style="font-size: 11px;">#${download.id} - Download</div>
                        <div class="ascii-header-line" style="flex:1;"></div>
                    </div>
                    <div class="ascii-content" style="padding: 15px; display: flex; flex-direction: column; gap: 8px; height: 100%; box-sizing: border-box;">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed hsl(var(--border) / 0.5); padding-bottom: 5px; margin-bottom: 5px;">
                            <span class="download-name" onclick="copyLink(${download.id})" style="color: hsl(var(--accent)); font-weight: bold; font-size: 13px; cursor: pointer;">${download.name}</span>
                            <a href="${download.url}" target="_blank" rel="noopener noreferrer" class="download-btn">DOWNLOAD</a>
                        </div>
                        <div class="download-description" style="font-size: 11px; color: hsl(var(--foreground)); line-height: 1.4; flex-grow: 1; overflow-y: auto;">${download.description}</div>
                        <div class="admin-action-row">
                            <button class="admin-btn" onclick="openEditDownloadModal(${idx})">Edit</button>
                            <button class="admin-btn danger-btn" onclick="deleteDownload(${download.id})">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            layoutCards();
            handleHash(window.location.hash.substring(1));
        }

        function layoutCards() {
            const container = document.getElementById('tab-container');
            const cards = container.querySelectorAll('.download-card-window');
            const containerWidth = container.clientWidth || window.innerWidth;
            
            const cardWidth = 340;
            const cardHeight = 160; 
            const gap = 20;
            const padding = 20;
            
            let cols = Math.floor((containerWidth - padding * 2 + gap) / (cardWidth + gap));
            if (cols < 1) cols = 1;

            let maxTop = 0;

            cards.forEach((card, idx) => {
                const savedPos = localStorage.getItem(`dl_pos_${idx}`);
                if (savedPos) {
                    const pos = JSON.parse(savedPos);
                    card.style.left = pos.left;
                    card.style.top = pos.top;
                } else {
                    const col = idx % cols;
                    const row = Math.floor(idx / cols);
                    card.style.left = (padding + col * (cardWidth + gap)) + 'px';
                    card.style.top = (padding + row * (cardHeight + gap)) + 'px';
                }
                
                const topVal = parseInt(card.style.top) || 0;
                if (topVal > maxTop) maxTop = topVal;
                
                makeCardDraggable(card, card.querySelector('.card-drag-handle'));
            });
            
            let dummy = document.getElementById('scroll-dummy');
            if (!dummy) {
                dummy = document.createElement('div');
                dummy.id = 'scroll-dummy';
                dummy.style.position = 'absolute';
                dummy.style.width = '1px';
                container.appendChild(dummy);
            }
            dummy.style.top = (maxTop + cardHeight + padding) + 'px';
        }

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function makeCardDraggable(win, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                e.preventDefault();
                win.style.zIndex = ++highestZ;
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                let newTop = win.offsetTop - pos2;
                let newLeft = win.offsetLeft - pos1;
                
                const container = document.getElementById('tab-container');
                const maxLeft = container.clientWidth - win.offsetWidth;
                const maxTop = Math.max(container.clientHeight, container.scrollHeight) - win.offsetHeight;
                
                win.style.top = clamp(newTop, 0, maxTop) + "px";
                win.style.left = clamp(newLeft, 0, maxLeft) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                const idx = win.dataset.index;
                localStorage.setItem(`dl_pos_${idx}`, JSON.stringify({
                    left: win.style.left,
                    top: win.style.top
                }));
            }
        }

        function copyLink(id) {
            const baseUrl = window.parent.location.origin + window.parent.location.pathname;
            const newHash = `page=downloads&id=${id}`;
            const fullUrl = `${baseUrl}#${newHash}`;
            
            window.parent.history.replaceState(null, null, `#${newHash}`);
            
            navigator.clipboard.writeText(fullUrl).then(() => {
                const toast = document.getElementById('copy-toast');
                toast.textContent = `LINK COPIED #${id}`;
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });

            document.querySelectorAll('.download-card-window').forEach(card => card.style.borderColor = '');
            
            const activeCard = document.getElementById(`download-${id}`);
            if (activeCard) {
                activeCard.style.borderColor = 'hsl(var(--accent))';
                setTimeout(() => { activeCard.style.borderColor = ''; }, 1000);
            }
        }

        function handleHash(hash) {
            const params = new URLSearchParams(hash);
            const id = params.get('id');
            if (id) {
                setTimeout(() => {
                    const element = document.getElementById(`download-${id}`);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        element.style.borderColor = 'hsl(var(--accent))';
                        setTimeout(() => { element.style.borderColor = ''; }, 1000);
                    }
                }, 300);
            }
        }

        window.openAddDownloadModal = () => {
            window.parent.postMessage({ type: 'open-editor', editorType: 'download', title: 'Create Download Card' }, '*');
        };

        window.openEditDownloadModal = (idx) => {
            const dl = downloadsData[idx];
            window.parent.postMessage({ type: 'open-editor', editorType: 'download', title: `Edit Download Card #${dl.id}`, id: dl.id, data: dl }, '*');
        };

        window.deleteDownload = async (id) => {
            if (!confirm(`Are you sure you want to delete download card #${id}?`)) return;
            downloadsData = downloadsData.filter(d => d.id !== id);
            await syncToSupabase();
        };

        window.addEventListener('resize', () => {
            const container = document.getElementById('tab-container');
            const cards = container.querySelectorAll('.download-card-window');
            let hasUnsaved = false;
            cards.forEach(card => {
                if (!localStorage.getItem(`dl_pos_${card.dataset.index}`)) {
                    hasUnsaved = true;
                }
            });
            if (hasUnsaved) layoutCards();
        });

        document.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            initAuth();
        });
    </script>
</body>
</html>
