<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - Error Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/storage/internal/styles/page-styles.css">
    <script src="/storage/internal/scripts/embed-detect.js"></script>
    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar {
            display: none !important;
        }
        * { 
            border-radius: 0 !important; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        .game-section { margin-bottom: 3rem; position: relative; }
        .section-title { 
            color: hsl(var(--accent)); 
            margin-bottom: 1.2rem; 
            font-size: 1rem; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .tilt-wrapper {
            display: block;
            perspective: 1000px;
            user-select: none;
            position: relative;
        }
        .favorite-list .tilt-wrapper {
            perspective: 2000px; 
            margin-bottom: 12px;
        }
        .fav-card, .liked-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease-out, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            transform-style: preserve-3d;
            pointer-events: none;
            will-change: transform;
            backface-visibility: hidden;
            outline: 1px solid transparent; 
            transform: translateZ(1px); 
        }
        .tilt-wrapper:hover .fav-card, 
        .tilt-wrapper:hover .liked-card,
        .tilt-wrapper.is-tapped .fav-card,
        .tilt-wrapper.is-tapped .liked-card {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 100;
        }
        body.is-admin .tilt-wrapper {
            cursor: grab;
        }
        .fav-tags { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            justify-content: flex-end; 
            max-width: 50%; 
            transform-style: preserve-3d;
        }
        .tag-box { 
            font-size: 0.7rem; 
            padding: 4px 10px; 
            border: 1px solid; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            background: rgba(10, 10, 10, 0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            will-change: transform;
            backface-visibility: hidden;
            outline: 1px solid transparent;
        }
        .tilt-wrapper:hover .tag-box,
        .tilt-wrapper.is-tapped .tag-box {
            transform: 
                translateZ(var(--rand-z, 40px)) 
                translateY(var(--rand-y, -2px)) 
                rotateZ(var(--rand-r, 0deg));
            filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.5));
        }
        .tag-skill { border-color: hsl(var(--accent)); color: hsl(var(--accent)); }
        .tag-rating { border-color: #ffcc00; color: #ffcc00; }
        .tag-lf { border-color: #ffffff; color: #ffffff; opacity: 0.8; }
        .fav-card {
            padding: 35px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            overflow: hidden;
        }
        .fav-info-group { transform-style: preserve-3d; }
        .fav-title { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: #fff; 
            margin-bottom: 6px; 
            transition: transform 0.4s ease;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .tilt-wrapper:hover .fav-title,
        .tilt-wrapper.is-tapped .fav-title { 
            transform: translateZ(20px); 
        }
        .fav-comment { font-size: 0.85rem; opacity: 0.6; display: block; white-space: pre-wrap; line-height: 1.4; }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .games-grid .tilt-wrapper { height: 85px; }
        .liked-card {
            height: 100%;
            padding: 8px;
            text-align: center;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            line-height: 1.2;
        }
        @media (max-width: 1000px) { .games-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 750px) { 
            .games-grid { grid-template-columns: repeat(3, 1fr); } 
            .fav-card { flex-direction: column; align-items: flex-start; padding: 25px; }
            .fav-tags { justify-content: flex-start; max-width: 100%; margin-top: 25px; }
        }
        .admin-action-btn {
            display: none;
            position: absolute;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
            pointer-events: auto !important;
            color: hsl(var(--foreground));
        }
        .admin-action-btn:hover {
            color: hsl(var(--accent));
        }
        .admin-action-btn.del-btn {
            color: hsl(var(--muted-foreground));
        }
        .admin-action-btn.del-btn:hover {
            color: hsl(var(--destructive));
        }
        body.is-admin .admin-action-btn {
            display: block;
        }
        .add-grid-item-container {
            display: none;
            width: 100%;
            border: 2px dashed hsl(var(--border));
            padding: 10px;
            margin-bottom: 15px;
            gap: 10px;
        }
        body.is-admin .add-grid-item-container {
            display: flex;
        }
        .add-grid-item-container input {
            flex: 1;
            padding: 8px 12px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-grid-item-container input:focus {
            border-color: hsl(var(--accent));
        }
        .admin-section-btn {
            display: none;
            background: none;
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            margin-bottom: 12px;
        }
        .admin-section-btn:hover {
            border-color: hsl(var(--accent));
            color: hsl(var(--accent));
        }
        body.is-admin .admin-section-btn {
            display: inline-block;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: hsl(var(--card));
            border: 2px solid hsl(var(--border));
            padding: 24px;
            width: 90%;
            max-width: 440px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid hsl(var(--border));
        }
        .modal-header h2 {
            font-size: 16px;
            margin: 0;
            color: hsl(var(--accent));
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: hsl(var(--foreground));
        }
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal input[type=text], .modal textarea, .modal select {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus {
            border-color: hsl(var(--accent));
        }
        .modal select {
            width: 100%;
            padding: 10px;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal select:focus {
            border-color: hsl(var(--accent));
        }
        .modal select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal-check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .modal-check-row input[type=checkbox] {
            accent-color: hsl(var(--accent)) !important;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        .btn-primary {
            background: hsl(var(--accent)) !important;
            color: hsl(var(--accent-foreground)) !important;
            border: 1px solid hsl(var(--accent)) !important;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .grid-add-btn {
            background: hsl(var(--secondary) / 0.3);
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            width: 38px;
            height: 38px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }
        .grid-add-btn:hover {
            background: hsl(var(--accent) / 0.1);
            color: hsl(var(--accent));
            border-color: hsl(var(--accent));
        }
        .grid-add-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">Liked Games</h1>
        
        <div class="game-section">
            <h2 class="section-title">Favorite</h2>
            <button class="admin-section-btn" onclick="openAddFavModal()">+ Add Favorite Game</button>
            <div id="favorite-list" class="favorite-list"></div>
        </div>

        <div class="game-section">
            <h2 class="section-title">Games I Like</h2>
            <div class="add-grid-item-container">
                <input type="text" id="add-liked-input" placeholder="Add game to 'Games I Like' list...">
                <button class="grid-add-btn" onclick="addGridItem('liked')">+</button>
            </div>
            <div id="liked-games-grid" class="games-grid"></div>
        </div>

        <div class="game-section">
            <h2 class="section-title">Want to Play</h2>
            <div class="add-grid-item-container">
                <input type="text" id="add-wtp-input" placeholder="Add game to 'Want to Play' list...">
                <button class="grid-add-btn" onclick="addGridItem('wanttoplay')">+</button>
            </div>
            <div id="wtp-games-grid" class="games-grid"></div>
        </div>
    </div>

    <div id="fav-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title-label">Manage Favorite Game</h2>
                <button class="modal-close" onclick="closeFavModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="fav-title-input" placeholder="Game Title">
                <textarea id="fav-comment-input" placeholder="Comment"></textarea>
                
                <div style="border-top:1px dashed hsl(var(--border)); padding-top:12px; display:flex; flex-direction:column; gap:8px;">
                    <div class="modal-check-row">
                        <input type="checkbox" id="fav-skill-display" onchange="toggleSelectState('skill')">
                        <label for="fav-skill-display">Display Skill Tag</label>
                    </div>
                    <select id="fav-skill-level" disabled>
                        <option value="casual">Casual</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="expert">Expert</option>
                    </select>

                    <div class="modal-check-row" style="margin-top:5px;">
                        <input type="checkbox" id="fav-rating-display" onchange="toggleSelectState('rating')">
                        <label for="fav-rating-display">Display Rating Tag</label>
                    </div>
                    <select id="fav-rating-value" disabled>
                        <option value="loveit">Love it</option>
                        <option value="obsessed">Obsessed</option>
                        <option value="betterthanyou">Better than you</option>
                    </select>

                    <div class="modal-check-row" style="margin-top:5px;">
                        <input type="checkbox" id="fav-lf-display" onchange="toggleSelectState('lf')">
                        <label for="fav-lf-display">Display LFG Tag</label>
                    </div>
                    <select id="fav-lf-value" disabled>
                        <option value="lfg">Looking for group</option>
                        <option value="otp">Open to play</option>
                        <option value="lft">Looking for tips</option>
                        <option value="ltd">Looking to discuss</option>
                    </select>
                </div>

                <button class="btn-primary" onclick="saveFavorite()" style="width: 100%; padding: 10px; margin-top:5px;">Save Favorite</button>
            </div>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = "https://wtasesmqwpnbwzdynnas.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ay0PuIePjZwrEgP5XpD5iQ_W5wC-5g9";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const MAPPINGS = {
            'casual': 'Casual', 'intermediate': 'Intermediate', 'expert': 'Expert',
            'betterthanyou': 'Better than you', 'obsessed': 'Obsessed', 'loveit': 'Love it',
            'kindofloveit': 'Kind of love it', 'kindofhateit': 'Kind of hate it',
            'ragequitting': 'Rage quitting', 'lfg': 'Looking for group',
            'otp': 'Open to play', 'lft': 'Looking for tips',
            'ott': 'Open to teach', 'ltd': 'Looking to discuss'
        };

        let gamesData = null;
        let isAdmin = false;
        let activeEditIdx = null;
        let dragItemIdx = null;
        let dragCategory = null;

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            handleUserSession(session);
            supabaseClient.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        function handleUserSession(session) {
            if (session && session.user && session.user.email.toLowerCase() === '3rr0r.d3v@gmail.com') {
                isAdmin = true;
                document.body.classList.add('is-admin');
            } else {
                isAdmin = false;
                document.body.classList.remove('is-admin');
            }
            if (gamesData) renderPage();
        }

        async function initDatabase() {
            const { data, error } = await supabaseClient
                .from('site_content')
                .select('data')
                .eq('key', 'games')
                .single();

            if (data && data.data) {
                gamesData = data.data;
                renderPage();
            }

            supabaseClient
                .channel('games-realtime')
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'site_content', filter: 'key=eq.games' },
                    (payload) => {
                        if (payload.new && payload.new.data) {
                            gamesData = payload.new.data;
                            renderPage();
                        }
                    }
                )
                .subscribe();
        }

        async function syncToSupabase() {
            if (!isAdmin) return;
            const { error } = await supabaseClient
                .from('site_content')
                .update({ data: gamesData })
                .eq('key', 'games');
            if (error) {
                alert("Error saving: " + error.message);
            }
        }

        function renderPage() {
            renderFavorites(gamesData.favorites);
            renderGrid(gamesData.liked, 'liked-games-grid', 'liked');
            renderGrid(gamesData.wanttoplay, 'wtp-games-grid', 'wanttoplay');
        }

        function renderFavorites(favs) {
            const container = document.getElementById('favorite-list');
            container.innerHTML = '';
            if (!favs) return;
            favs.forEach((game, idx) => {
                let tagsHTML = '';
                if (game.tags.skill?.display) tagsHTML += `<span class="tag-box tag-skill">${MAPPINGS[game.tags.skill.level] || game.tags.skill.level}</span>`;
                if (game.tags.rating?.display) tagsHTML += `<span class="tag-box tag-rating">${MAPPINGS[game.tags.rating.rating] || game.tags.rating.rating}</span>`;
                if (game.tags.lf?.display) tagsHTML += `<span class="tag-box tag-lf">${MAPPINGS[game.tags.lf.looking] || game.tags.lf.looking}</span>`;
                
                const inner = `
                    <button class="admin-action-btn" id="edit-fav-btn-${idx}" style="top:4px; left:4px;">✎</button>
                    <button class="admin-action-btn del-btn" id="del-fav-btn-${idx}" style="top:4px; right:4px;">✕</button>
                    <div class="fav-info-group">
                        <div class="fav-title">${game.title}</div>
                        ${game.comment ? `<span class="fav-comment">${game.comment}</span>` : ''}
                    </div>
                    <div class="fav-tags">${tagsHTML}</div>
                `;
                
                const wrap = createTiltWrapper('fav-card', inner);
                wrap.dataset.index = idx;
                
                if (isAdmin) {
                    wrap.draggable = true;
                    wrap.addEventListener('dragstart', (e) => {
                        dragItemIdx = idx;
                        dragCategory = 'favorites';
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    wrap.addEventListener('dragover', (e) => {
                        if (dragCategory !== 'favorites') return;
                        e.preventDefault();
                    });
                    wrap.addEventListener('drop', async (e) => {
                        if (dragCategory !== 'favorites') return;
                        e.preventDefault();
                        const targetIdx = idx;
                        if (dragItemIdx === targetIdx) return;
                        const [reorderedItem] = gamesData.favorites.splice(dragItemIdx, 1);
                        gamesData.favorites.splice(targetIdx, 0, reorderedItem);
                        await syncToSupabase();
                    });
                }

                container.appendChild(wrap);

                const delBtn = document.getElementById(`del-fav-btn-${idx}`);
                if (delBtn) {
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteFavorite(idx); };
                }

                const editBtn = document.getElementById(`edit-fav-btn-${idx}`);
                if (editBtn) {
                    editBtn.onclick = (e) => { e.stopPropagation(); openEditFavModal(game, idx); };
                }
            });
        }

        function renderGrid(list, containerId, categoryKey) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            if (!list) return;
            list.forEach((title, idx) => {
                const inner = `
                    <button class="admin-action-btn" style="top:5px; left:5px; font-size:10px;" id="grid-edit-${categoryKey}-${idx}">✎</button>
                    <button class="admin-action-btn del-btn" style="top:5px; right:5px; font-size:10px;" id="grid-del-${categoryKey}-${idx}">✕</button>
                    ${title}
                `;
                
                const wrap = createTiltWrapper('liked-card', inner);
                wrap.dataset.index = idx;
                
                if (isAdmin) {
                    wrap.draggable = true;
                    wrap.addEventListener('dragstart', (e) => {
                        dragItemIdx = idx;
                        dragCategory = categoryKey;
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    wrap.addEventListener('dragover', (e) => {
                        if (dragCategory !== categoryKey) return;
                        e.preventDefault();
                    });
                    wrap.addEventListener('drop', async (e) => {
                        if (dragCategory !== categoryKey) return;
                        e.preventDefault();
                        const targetIdx = idx;
                        if (dragItemIdx === targetIdx) return;
                        const listArr = categoryKey === 'liked' ? gamesData.liked : gamesData.wanttoplay;
                        const [reorderedItem] = listArr.splice(dragItemIdx, 1);
                        listArr.splice(targetIdx, 0, reorderedItem);
                        await syncToSupabase();
                    });
                }

                grid.appendChild(wrap);

                const delBtn = document.getElementById(`grid-del-${categoryKey}-${idx}`);
                if (delBtn) {
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteGridItem(categoryKey, idx); };
                }

                const editBtn = document.getElementById(`grid-edit-${categoryKey}-${idx}`);
                if (editBtn) {
                    editBtn.onclick = (e) => { e.stopPropagation(); editGridItem(categoryKey, idx); };
                }
            });
            document.querySelectorAll('.liked-card').forEach(fitText);
        }

        function randomizeTags(wrapper) {
            const tags = wrapper.querySelectorAll('.tag-box');
            tags.forEach(tag => {
                const z = Math.floor(Math.random() * 50) + 30;
                const y = Math.floor(Math.random() * 12) * -1;
                const r = Math.floor(Math.random() * 24) - 12;
                tag.style.setProperty('--rand-z', `${z}px`);
                tag.style.setProperty('--rand-y', `${y}px`);
                tag.style.setProperty('--rand-r', `${r}deg`);
            });
        }

        function handleTilt(e) {
            const wrapper = e.currentTarget;
            const card = wrapper.querySelector('.fav-card, .liked-card');
            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            let rotX, rotY, scale;

            if (card.classList.contains('fav-card')) {
                rotX = (centerY - y) / 15; 
                rotY = (x - centerX) / 80; 
                rotX = Math.max(Math.min(rotX, 7), -7);
                rotY = Math.max(Math.min(rotY, 7), -7);
                scale = 1.03;
            } else {
                rotX = (centerY - y) / 6; 
                rotY = (x - centerX) / 10;
                scale = 1.1;
            }
            card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(${scale}, ${scale}, ${scale})`;
        }

        function resetAllTilts() {
            document.querySelectorAll('.fav-card, .liked-card').forEach(card => {
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                card.parentElement.classList.remove('is-tapped');
            });
        }

        function createTiltWrapper(contentClass, innerHTML) {
            const wrap = document.createElement('div');
            wrap.className = 'tilt-wrapper';
            wrap.innerHTML = `<div class="${contentClass}">${innerHTML}</div>`;
            const startInteraction = () => {
                if (contentClass === 'fav-card') randomizeTags(wrap);
                wrap.classList.add('is-tapped');
            };

            wrap.addEventListener('mouseenter', startInteraction);
            wrap.addEventListener('touchstart', (e) => {
                resetAllTilts();
                startInteraction();
                handleTilt(e);
            }, {passive: true});

            wrap.addEventListener('mousemove', handleTilt);
            wrap.addEventListener('touchmove', handleTilt, {passive: true});
            wrap.addEventListener('mouseleave', () => {
                const card = wrap.querySelector('.fav-card, .liked-card');
                card.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                wrap.classList.remove('is-tapped');
            });
            return wrap;
        }

        function fitText(el) {
            let fontSize = 0.85;
            el.style.fontSize = fontSize + 'rem';
            while (el.scrollHeight > el.offsetHeight && fontSize > 0.5) {
                fontSize -= 0.02;
                el.style.fontSize = fontSize + 'rem';
            }
        }

        window.toggleSelectState = (key) => {
            const displayChecked = document.getElementById(`fav-${key}-display`).checked;
            let el;
            if (key === 'skill') el = document.getElementById('fav-skill-level');
            else if (key === 'rating') el = document.getElementById('fav-rating-value');
            else if (key === 'lf') el = document.getElementById('fav-lf-value');
            if (el) el.disabled = !displayChecked;
        };

        window.openAddFavModal = () => {
            activeEditIdx = null;
            document.getElementById('modal-title-label').textContent = "Add Favorite Game";
            document.getElementById('fav-title-input').value = '';
            document.getElementById('fav-comment-input').value = '';
            document.getElementById('fav-skill-display').checked = false;
            document.getElementById('fav-rating-display').checked = false;
            document.getElementById('fav-lf-display').checked = false;
            toggleSelectState('skill');
            toggleSelectState('rating');
            toggleSelectState('lf');
            document.getElementById('fav-modal').classList.add('active');
        };

        function openEditFavModal(game, idx) {
            activeEditIdx = idx;
            document.getElementById('modal-title-label').textContent = "Edit Favorite Game";
            document.getElementById('fav-title-input').value = game.title;
            document.getElementById('fav-comment-input').value = game.comment || '';
            document.getElementById('fav-skill-display').checked = game.tags.skill?.display || false;
            document.getElementById('fav-skill-level').value = game.tags.skill?.level || 'casual';
            document.getElementById('fav-rating-display').checked = game.tags.rating?.display || false;
            document.getElementById('fav-rating-value').value = game.tags.rating?.rating || 'loveit';
            document.getElementById('fav-lf-display').checked = game.tags.lf?.display || false;
            document.getElementById('fav-lf-value').value = game.tags.lf?.looking || 'lfg';
            toggleSelectState('skill');
            toggleSelectState('rating');
            toggleSelectState('lf');
            document.getElementById('fav-modal').classList.add('active');
        }

        window.closeFavModal = () => {
            document.getElementById('fav-modal').classList.remove('active');
        };

        window.saveFavorite = async () => {
            const title = document.getElementById('fav-title-input').value.trim();
            const comment = document.getElementById('fav-comment-input').value.trim();
            if (!title) return;

            const favObj = {
                title,
                comment,
                tags: {
                    skill: {
                        display: document.getElementById('fav-skill-display').checked,
                        level: document.getElementById('fav-skill-level').value
                    },
                    rating: {
                        display: document.getElementById('fav-rating-display').checked,
                        rating: document.getElementById('fav-rating-value').value
                    },
                    lf: {
                        display: document.getElementById('fav-lf-display').checked,
                        looking: document.getElementById('fav-lf-value').value
                    }
                }
            };

            if (activeEditIdx !== null) {
                gamesData.favorites[activeEditIdx] = favObj;
            } else {
                gamesData.favorites.push(favObj);
            }

            closeFavModal();
            await syncToSupabase();
        };

        async function deleteFavorite(idx) {
            if (!confirm(`Are you sure you want to delete this favorite game?`)) return;
            gamesData.favorites = gamesData.favorites.filter((_, i) => i !== idx);
            await syncToSupabase();
        }

        window.addGridItem = async (categoryKey) => {
            const input = document.getElementById(categoryKey === 'liked' ? 'add-liked-input' : 'add-wtp-input');
            const val = input.value.trim();
            if (!val) return;
            if (categoryKey === 'liked') {
                gamesData.liked.push(val);
            } else {
                gamesData.wanttoplay.push(val);
            }
            input.value = '';
            await syncToSupabase();
        };

        async function deleteGridItem(categoryKey, idx) {
            if (!confirm(`Are you sure you want to delete this item?`)) return;
            if (categoryKey === 'liked') {
                gamesData.liked = gamesData.liked.filter((_, i) => i !== idx);
            } else {
                gamesData.wanttoplay = gamesData.wanttoplay.filter((_, i) => i !== idx);
            }
            await syncToSupabase();
        }

        window.editGridItem = async (categoryKey, idx) => {
            const listArr = categoryKey === 'liked' ? gamesData.liked : gamesData.wanttoplay;
            const newVal = prompt("Edit Game Title:", listArr[idx]);
            if (newVal !== null && newVal.trim() !== '') {
                listArr[idx] = newVal.trim();
                await syncToSupabase();
            }
        };

        document.addEventListener('touchstart', (e) => {
            if (!e.target.closest('.tilt-wrapper')) {
                resetAllTilts();
            }
        }, {passive: true});

        document.addEventListener('DOMContentLoaded', () => {
            initDatabase();
            initAuth();
        });
    </script>
</body>
</html>
