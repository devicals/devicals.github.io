<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painful existence, silent suffering</title>
    <link rel="icon" type="image/x-icon" href="/storage/assets/favicon.ico">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="position:fixed; inset:0; background:#050505; z-index:-2;"></div>
    <div style="position:fixed; inset:0; background:url('/storage/assets/background.png') center/cover; opacity:0.08; z-index:-1;"></div>

    <iframe id="content-frame" style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:1;"></iframe>

    <div class="ascii-window" id="nav-window" style="left: 20px; top: 20px; width: 280px; z-index: 100;">
        <div class="ascii-drag-handle" id="nav-drag"></div>
        <div class="ascii-corner tl">┌</div><div class="ascii-corner tr">┐</div><div class="ascii-corner bl">└</div><div class="ascii-corner br">┘</div>
        <div class="ascii-title-container">
            <span class="ascii-title">nav</span>
        </div>
        <div class="ascii-content nav-tree" id="nav-tree-content"></div>
    </div>
    
    <div class="ascii-window" id="announcement-window" style="left: 320px; top: 20px; width: 450px; z-index: 101; display:none;">
        <div class="ascii-drag-handle" id="ann-drag"></div>
        <div class="ascii-corner tl">┌</div><div class="ascii-corner tr">┐</div><div class="ascii-corner bl">└</div><div class="ascii-corner br">┘</div>
        <div class="ascii-title-container">
            <span class="ascii-title">notice</span>
        </div>
        <div class="ascii-right-container">
            <span class="ascii-close" onclick="closeAnnouncement()">x</span>
        </div>
        <div class="ascii-content" id="announcement-content"></div>
    </div>

    <div class="ascii-window" id="settings-window" style="left: 20px; top: 400px; width: 700px; height: 480px; z-index: 105; display:none;">
        <div class="ascii-drag-handle" id="set-drag"></div>
        <div class="ascii-corner tl">┌</div><div class="ascii-corner tr">┐</div><div class="ascii-corner bl">└</div><div class="ascii-corner br">┘</div>
        <div class="ascii-title-container">
            <span class="ascii-title">terminal.exe</span>
        </div>
        <div class="ascii-right-container">
            <span class="ascii-close" onclick="closePreferences()">x</span>
        </div>
        <div class="ascii-content terminal-container" id="terminal-container">
            <div id="term-out" class="terminal-output">DEV.WEB - v5.289.628
(c) Error Dev. All rights reserved.

Type 'help' to see a list of available commands.</div>
            <div class="terminal-input-line">
                <span id="term-prefix" class="terminal-prompt">U &gt; github\pages\devicals &gt;</span>
                <input type="text" id="term-in" class="terminal-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>

    <div class="ascii-window" id="lock-window" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 300px; z-index: 2000; display:none;">
        <div class="ascii-drag-handle" id="lock-drag"></div>
        <div class="ascii-corner tl">┌</div><div class="ascii-corner tr">┐</div><div class="ascii-corner bl">└</div><div class="ascii-corner br">┘</div>
        <div class="ascii-title-container">
            <span class="ascii-title">auth_required.exe</span>
        </div>
        <div class="ascii-right-container">
            <span class="ascii-close" onclick="closeLockModal()">x</span>
        </div>
        <div class="ascii-content">
            <input type="password" id="lock-input" class="ascii-input" style="margin-bottom:8px;" placeholder="Password">
            <button class="ascii-btn" onclick="checkLock()" style="color:hsl(var(--accent));">[ Unlock ]</button>
        </div>
    </div>

    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="/storage/internal/scripts/main.js"></script>
</body>
</html>
