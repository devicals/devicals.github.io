<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painful existence, silent suffering</title>
    <link rel="icon" type="image/x-icon" href="/storage/assets/favicon.ico">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="position:fixed; inset:0; background:#050505; z-index:-2;"></div>
    <div style="position:fixed; inset:0; background:url('/storage/assets/background.png') center/cover; opacity:0.08; z-index:-1;"></div>

    <iframe id="content-frame" style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:1;"></iframe>

    <div class="window" id="nav-window" style="left: 20px; top: 20px; width: 280px; z-index: 100;">
        <div class="window-header" id="nav-drag">
            <span class="window-title">nav</span>
        </div>
        <div class="window-content nav-tree" id="nav-tree-content"></div>
    </div>
    
    <div class="window" id="announcement-window" style="left: 320px; top: 20px; width: 450px; z-index: 101; display:none;">
        <div class="window-header" id="ann-drag">
            <span class="window-title">notice</span>
            <div class="window-controls"><span class="window-close" onclick="closeAnnouncement()">x</span></div>
        </div>
        <div class="window-content" id="announcement-content"></div>
    </div>

    <div class="window" id="terminal-window" style="left: 20px; top: 400px; width: 550px; z-index: 105; display:none;">
        <div class="window-header" id="term-drag">
            <span class="window-title">terminal.exe</span>
            <div class="window-controls"><span class="window-close" onclick="closeTerminal()">x</span></div>
        </div>
        <div class="window-content" style="font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; display: flex; flex-direction: column; height: 350px;">
            <div id="term-output" style="flex: 1; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; word-break: break-all;">
                <div style="color: hsl(var(--accent));">DEV.WEB - v5.289.628<br>(c) Error Dev. All rights reserved.<br><br></div>
            </div>
            <div style="display: flex; align-items: center;">
                <span id="term-prompt-prefix" style="color: hsl(var(--accent)); margin-right: 8px; white-space: nowrap;">U > github\pages\devicals ></span>
                <input type="text" id="term-input" style="flex: 1; background: transparent; border: none; color: hsl(var(--foreground)); font-family: inherit; font-size: inherit; outline: none;" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <div class="window" id="lock-window" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 300px; z-index: 2000; display:none;">
        <div class="window-header" id="lock-drag">
            <span class="window-title">auth_required.exe</span>
            <div class="window-controls"><span class="window-close" onclick="closeLockModal()">x</span></div>
        </div>
        <div class="window-content">
            <input type="password" id="lock-input" class="ascii-input" style="margin-bottom:8px;" placeholder="Password">
            <button class="ascii-btn" onclick="checkLock()" style="color:hsl(var(--accent));">[ Unlock ]</button>
        </div>
    </div>

    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="/storage/internal/scripts/main.js"></script>
</body>
</html>
