<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painful existence, silent suffering</title>
    <link rel="icon" type="image/x-icon" href="/storage/assets/favicon.ico">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar {
            display: none !important;
        }
        * {
            scrollbar-width: none !important;
            -ms-overflow-style: none !important;
        }
        .nav-top-actions > div {
            display: grid !important;
            grid-template-columns: 2fr 3fr !important;
            gap: 4px !important;
            width: 100% !important;
        }
        .setting-field {
            width: 100%;
            padding: 8px 10px;
            background: hsl(var(--input));
            border: 2px solid hsl(var(--border));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 13px;
            outline: none;
            margin-bottom: 8px;
        }
        .ann-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: hsl(var(--secondary));
            border: 1px solid hsl(var(--border));
            padding: 8px 12px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .ann-list-item button {
            background: none;
            border: none;
            color: hsl(var(--destructive));
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-tab" onclick="toggleSidebar()">
            <span id="toggle-icon">▲</span>
            <span id="sidebar-title-label">Dev's Coffin</span>
        </div>
        
        <div class="sidebar-container">
            <nav class="sidebar-nav">
                <div class="nav-section nav-top-actions">
                    <div style="display: flex; gap: 4px; align-items: stretch;">
                        <a class="action-btn" href="#page=info" onclick="loadPage('info'); toggleSidebar(); return false;">ⓘ Info</a>
                        <button class="action-btn" onclick="openPreferences()">⚙ Settings</button>
                    </div>
                </div>

                <div class="nav-section">
                    <h3 onclick="toggleSection(this)">MAIN</h3>
                    <a href="#page=home" onclick="loadPage('home'); toggleSidebar(); return false;">Home</a>
                    <a href="#page=blogs" onclick="loadPage('blogs'); toggleSidebar(); return false;">Blogs</a>
                </div>

                <div class="nav-section">
                    <h3 onclick="toggleSection(this)">CONTENT</h3>
                    <a href="#page=projects" onclick="loadPage('projects'); toggleSidebar(); return false;">Projects</a>
                    <a href="#page=downloads" onclick="loadPage('downloads'); toggleSidebar(); return false;">Downloads</a>
                </div>

                <div id="custom-pages-container"></div>
            </nav>
        </div>
    </div>
    
    <div id="announcement-banner" class="announcement-banner hidden">
        <div class="announcement-content"></div>
        <button class="announcement-close" onclick="closeAnnouncement()">×</button>
    </div>

    <div id="main-content" class="main-content">
        <div class="page-background"></div>
        <iframe id="content-frame" src=""></iframe>
    </div>

    <div id="preferences-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" onclick="closePreferences()">×</button>
            </div>
            <div class="modal-body">
                <div class="preference-section">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="vitesse-dark">Vitesse Dark (Default)</option>
                        <option value="original">Original</option>
                        <option value="evergreens">Evergreens</option>
                        <option value="gruvbox">Gruvbox</option>
                        <option value="ice-world">Ice World</option>
                        <option value="purple-orange">Purple & Orange</option>
                        <option value="orange-purple">Orange & Purple</option>
                        <option value="pink-dream">Pink Dream</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="desert">Desert</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                
                <div id="settings-admin-portal" class="preference-section" style="border-top: 1px solid hsl(var(--border)); padding-top: 15px;">
                </div>
            </div>
        </div>
    </div>

    <div id="lock-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Locked Page</h2>
                <button class="modal-close" onclick="closeLockModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="preference-section">
                    <label>Can Pineapple</label>
                    <input type="text" id="lock-input" style="width: 100%; padding: 10px; background: hsl(var(--input)); border: 2px solid hsl(var(--border)); color: hsl(var(--foreground)); font-family: inherit;">
                </div>
                <button class="customize-btn" onclick="checkLock()">Unlock</button>
            </div>
        </div>
    </div>

    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="/storage/internal/scripts/main.js"></script>
</body>
</html>
