<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painful existence, silent suffering</title>
    <link rel="icon" type="image/x-icon" href="/storage/assets/favicon.ico">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="position:fixed; inset:0; background:hsl(var(--background)); z-index:-3;"></div>
    <iframe src="/bg.html" style="position:fixed; inset:0; width:100%; height:100%; border:none; z-index:-2; pointer-events:none; user-select:none; opacity: 0.15;"></iframe>
    <div style="position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:-1; pointer-events:none;"></div>

    <iframe id="content-frame" style="position:absolute; inset:0; width:100%; height:100%; border:none; z-index:1; display:none;"></iframe>

    <div id="desktop" class="desktop-area">
        <div class="ascii-window" id="nav-window" style="left: 20px; top: 20px; width: 280px; z-index: 100;">
            <div style="display: flex; align-items: center; height: 1px; margin-left: -1px; margin-right: -1px; width: calc(100% + 2px);">
                <div style="height: 1px; width: 15px; background: hsl(var(--foreground));"></div>
                <div id="nav-drag" style="padding: 0 8px; color: hsl(var(--accent)); font-weight: bold; cursor: move; transform: translateY(-50%); user-select: none;">nav</div>
                <div style="height: 1px; flex: 1; background: hsl(var(--foreground));"></div>
            </div>
            <div class="ascii-content nav-tree" id="nav-tree-content" style="padding: 15px; flex: 1; overflow-y: auto;"></div>
        </div>
        
        <div class="ascii-window" id="announcement-window" style="left: 320px; top: 20px; width: 450px; z-index: 101; display:none;">
            <div style="display: flex; align-items: center; height: 1px; margin-left: -1px; margin-right: -1px; width: calc(100% + 2px);">
                <div style="height: 1px; width: 15px; background: hsl(var(--foreground));"></div>
                <div id="ann-drag" style="padding: 0 8px; color: hsl(var(--accent)); font-weight: bold; cursor: move; transform: translateY(-50%); user-select: none;">notice</div>
                <div style="height: 1px; flex: 1; background: hsl(var(--foreground));"></div>
                <div style="padding: 0 8px; transform: translateY(-50%); cursor: pointer; color: hsl(var(--muted-foreground)); font-weight: bold;" onclick="closeAnnouncement()">x</div>
                <div style="height: 1px; width: 10px; background: hsl(var(--foreground));"></div>
            </div>
            <div class="ascii-content" id="announcement-content" style="padding: 15px; flex: 1; overflow-y: auto;"></div>
        </div>

        <div class="ascii-window" id="settings-window" style="left: 20px; top: 400px; width: 300px; z-index: 105; display:none;">
            <div style="display: flex; align-items: center; height: 1px; margin-left: -1px; margin-right: -1px; width: calc(100% + 2px);">
                <div style="height: 1px; width: 15px; background: hsl(var(--foreground));"></div>
                <div id="set-drag" style="padding: 0 8px; color: hsl(var(--accent)); font-weight: bold; cursor: move; transform: translateY(-50%); user-select: none;">settings.ini</div>
                <div style="height: 1px; flex: 1; background: hsl(var(--foreground));"></div>
                <div style="padding: 0 8px; transform: translateY(-50%); cursor: pointer; color: hsl(var(--muted-foreground)); font-weight: bold;" onclick="closePreferences()">x</div>
                <div style="height: 1px; width: 10px; background: hsl(var(--foreground));"></div>
            </div>
            <div class="ascii-content" style="padding: 15px; flex: 1; overflow-y: auto;">
                <div style="margin-bottom: 15px;">
                    <select id="theme-select" class="ascii-input" onchange="changeTheme(this.value)">
                        <option value="original">Original (Default)</option>
                        <option value="vitesse-dark">Vitesse Dark</option>
                        <option value="evergreens">Evergreens</option>
                        <option value="gruvbox">Gruvbox</option>
                        <option value="ice-world">Ice World</option>
                        <option value="purple-orange">Purple & Orange</option>
                        <option value="orange-purple">Orange & Purple</option>
                        <option value="pink-dream">Pink Dream</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="desert">Desert</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div id="settings-admin-portal" style="border-top: 1px dashed hsl(var(--foreground)/0.3); padding-top: 15px;"></div>
            </div>
        </div>

        <div class="ascii-window" id="lock-window" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 300px; z-index: 2000; display:none;">
            <div style="display: flex; align-items: center; height: 1px; margin-left: -1px; margin-right: -1px; width: calc(100% + 2px);">
                <div style="height: 1px; width: 15px; background: hsl(var(--foreground));"></div>
                <div id="lock-drag" style="padding: 0 8px; color: hsl(var(--accent)); font-weight: bold; cursor: move; transform: translateY(-50%); user-select: none;">auth_required.exe</div>
                <div style="height: 1px; flex: 1; background: hsl(var(--foreground));"></div>
                <div style="padding: 0 8px; transform: translateY(-50%); cursor: pointer; color: hsl(var(--muted-foreground)); font-weight: bold;" onclick="closeLockModal()">x</div>
                <div style="height: 1px; width: 10px; background: hsl(var(--foreground));"></div>
            </div>
            <div class="ascii-content" style="padding: 15px; flex: 1; overflow-y: auto;">
                <input type="password" id="lock-input" class="ascii-input" style="margin-bottom:8px;" placeholder="Password">
                <button class="btn-primary" onclick="checkLock()" style="width: 100%;">[ Unlock ]</button>
            </div>
        </div>
    </div>

    <div id="bio-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit_Bio.exe</h2>
                <button class="modal-close" onclick="closeBioModal()">x</button>
            </div>
            <div class="modal-body">
                <textarea id="bio-textarea-input" placeholder="Biography Markdown..."></textarea>
                <button class="btn-primary" onclick="saveBio()" style="width: 100%;">[ Execute Save ]</button>
            </div>
        </div>
    </div>

    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="/storage/internal/scripts/main.js"></script>
</body>
</html>
