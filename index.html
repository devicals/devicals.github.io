<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>painful existence, silent suffering</title>
    <link rel="icon" type="image/x-icon" href="/storage/assets/favicon.ico">
    <link rel="stylesheet" href="/storage/internal/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #mobile-blocker {
            display: none;
            position: fixed;
            inset: 0;
            background: hsl(var(--background));
            z-index: 99999;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            color: hsl(var(--foreground));
        }
        @media (max-width: 768px) {
            #mobile-blocker {
                display: flex;
            }
            #desktop, #taskbar, iframe, .modal {
                display: none !important;
            }
        }
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid hsl(var(--border));
            z-index: 10000;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        #start-button {
            background: transparent;
            border: 1px solid transparent;
            color: hsl(var(--foreground));
            font-size: 24px;
            cursor: pointer;
            height: 100%;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s, border-color 0.2s;
        }
        #start-button:hover {
            background: hsl(var(--secondary));
            border-color: hsl(var(--border));
        }
        .start-spin {
            transform: rotate(180deg) scale(1.1);
            background: hsl(var(--secondary)) !important;
            border-color: hsl(var(--accent)) !important;
            color: hsl(var(--accent)) !important;
        }
        #taskbar-items {
            display: flex;
            gap: 8px;
            margin-left: 15px;
            height: 100%;
            align-items: center;
        }
        .taskbar-item-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid hsl(var(--border));
            color: hsl(var(--foreground));
            padding: 0 15px;
            height: 32px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }
        .taskbar-item-btn:hover {
            background: hsl(var(--secondary));
        }
        #nav-window {
            position: fixed;
            left: 10px;
            bottom: 60px;
            top: 20px;
            width: 300px;
            z-index: 10001;
            transform: translateX(-120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        #nav-window.nav-open {
            transform: translateX(0);
        }
        .nav-vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            padding: 15px 5px;
            font-size: 10px;
            letter-spacing: 1px;
            color: hsl(var(--muted-foreground));
            border-left: 1px dashed hsl(var(--border));
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            background: rgba(0,0,0,0.2);
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(10px) scale(0.98); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .fade-out { animation: fadeOut 0.3s forwards; }
        .fade-in { animation: fadeIn 0.3s forwards; }
        
        #ann-progress-container {
            height: 2px;
            background: hsl(var(--secondary));
            width: 100%;
            margin-top: 12px;
        }
        #ann-progress-bar {
            height: 100%;
            background: hsl(var(--accent));
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="mobile-blocker">
        <div>
            <div style="font-size: 32px; margin-bottom: 15px; color: hsl(var(--accent));">✦</div>
            <p>Please view this website on a larger desktop screen.</p>
        </div>
    </div>

    <div style="position:fixed; inset:0; background:hsl(var(--background)); z-index:-3;"></div>
    <iframe src="/bg.html" style="position:fixed; inset:0; width:100%; height:100%; border:none; z-index:-2; pointer-events:none; user-select:none; opacity: 0.15;"></iframe>
    <div style="position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:-1; pointer-events:none;"></div>

    <iframe id="content-frame" style="position:absolute; inset:0; width:100%; height:calc(100% - 50px); border:none; z-index:1; display:none;"></iframe>

    <div id="desktop" class="desktop-area" style="height: calc(100% - 50px);">
        
        <div class="ascii-window" id="nav-window">
            <div class="ascii-header-row">
                <div class="ascii-header-line" style="width: 15px;"></div>
                <div class="ascii-title">nav</div>
                <div class="ascii-header-line" style="flex: 1;"></div>
            </div>
            <div class="ascii-content" style="padding: 0; flex: 1; display: flex; overflow: hidden;">
                <div class="nav-tree" id="nav-tree-content" style="padding: 15px; flex: 1; overflow-y: auto;"></div>
                <div class="nav-vertical-text">CTRL TO TOGGLE</div>
            </div>
        </div>
        
        <div class="ascii-window" id="announcement-window" style="left: 20px; bottom: 70px; top: auto; width: 450px; z-index: 101; display:none;">
            <div class="ascii-header-row">
                <div class="ascii-header-line" style="width: 15px;"></div>
                <div id="ann-drag" class="ascii-title">notice</div>
                <div class="ascii-header-line" style="flex: 1;"></div>
                <div class="ascii-close-btn" onclick="closeAnnouncement()">x</div>
                <div class="ascii-header-line" style="width: 10px;"></div>
            </div>
            <div class="ascii-content" style="padding: 15px; flex: 1; display: flex; flex-direction: column;">
                <div id="announcement-content" style="flex: 1; overflow-y: auto;"></div>
                <div id="ann-progress-container"><div id="ann-progress-bar"></div></div>
            </div>
        </div>

        <div class="ascii-window" id="settings-window" style="left: 20px; top: 40px; width: 300px; z-index: 105; display:none;">
            <div class="ascii-header-row">
                <div class="ascii-header-line" style="width: 15px;"></div>
                <div id="set-drag" class="ascii-title">settings.ini</div>
                <div class="ascii-header-line" style="flex: 1;"></div>
                <div class="ascii-minimize-btn" onclick="minimizeWindow('settings-window', 'settings.ini')" style="cursor:pointer; padding: 0 5px; color: hsl(var(--accent)); font-weight: bold;">_</div>
                <div class="ascii-close-btn" onclick="closePreferences()">x</div>
                <div class="ascii-header-line" style="width: 10px;"></div>
            </div>
            <div class="ascii-content" style="padding: 15px; flex: 1; overflow-y: auto;">
                <div style="margin-bottom: 15px;">
                    <select id="theme-select" class="ascii-input" onchange="changeTheme(this.value)">
                        <option value="default">Default</option>
                        <option value="original">Original</option>
                        <option value="vitesse-dark">Vitesse Dark</option>
                        <option value="evergreens">Evergreens</option>
                        <option value="gruvbox">Gruvbox</option>
                        <option value="ice-world">Ice World</option>
                        <option value="purple-orange">Purple & Orange</option>
                        <option value="orange-purple">Orange & Purple</option>
                        <option value="pink-dream">Pink Dream</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="desert">Desert</option>
                    </select>
                </div>
                <div id="settings-admin-portal" style="border-top: 1px dashed hsl(var(--foreground)/0.3); padding-top: 15px;"></div>
                <div style="border-top: 1px dashed hsl(var(--foreground)/0.3); padding-top: 15px; margin-top: 15px;">
                    <button class="ascii-btn" onclick="resetWindowPositions()" style="width: 100%; border: 1px solid hsl(var(--border)); padding: 6px;">[ Reset Window Positions ]</button>
                </div>
            </div>
        </div>

        <div class="ascii-window" id="lock-window" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 300px; z-index: 2000; display:none;">
            <div class="ascii-header-row">
                <div class="ascii-header-line" style="width: 15px;"></div>
                <div id="lock-drag" class="ascii-title">auth_required.exe</div>
                <div class="ascii-header-line" style="flex: 1;"></div>
                <div class="ascii-close-btn" onclick="closeLockModal()">x</div>
                <div class="ascii-header-line" style="width: 10px;"></div>
            </div>
            <div class="ascii-content" style="padding: 15px; flex: 1; overflow-y: auto;">
                <input type="password" id="lock-input" class="ascii-input" style="margin-bottom:8px;" placeholder="Password">
                <button class="btn-primary" onclick="checkLock()" style="width: 100%;">[ Unlock ]</button>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-button" onclick="toggleNav()">✦</button>
        <div id="taskbar-items"></div>
    </div>

    <div id="bio-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit_Bio.exe</h2>
                <button class="modal-close" onclick="closeBioModal()">x</button>
            </div>
            <div class="modal-body">
                <textarea id="bio-textarea-input" placeholder="Biography Markdown..."></textarea>
                <button class="btn-primary" onclick="saveBio()" style="width: 100%;">[ Execute Save ]</button>
            </div>
        </div>
    </div>

    <script src="/storage/internal/scripts/theme-manager.js"></script>
    <script src="/storage/internal/scripts/main.js"></script>
</body>
</html>
